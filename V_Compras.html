<div id="view-compras" class="container-fluid py-4 spa-view d-none">

    <div class="row mb-3 g-3">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-primary text-white text-center">
                <div class="card-body py-2">
                    <div class="small opacity-75 fw-bold text-uppercase" style="font-size:0.65rem">Neto Acumulado
                        (Filtro)</div>
                    <h3 id="kpi-compras-neto" class="fw-bold mb-0 text-truncate">$ 0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-success text-white text-center">
                <div class="card-body py-2">
                    <div class="small opacity-75 fw-bold text-uppercase" style="font-size:0.65rem">IVA Crédito</div>
                    <h3 id="kpi-compras-iva" class="fw-bold mb-0 text-truncate">$ 0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm border-start border-warning border-4 text-center">
                <div class="card-body py-2 text-dark">
                    <div class="small text-muted fw-bold text-uppercase" style="font-size:0.65rem">Otros Impuestos</div>
                    <h3 id="kpi-compras-otros" class="fw-bold mb-0 text-warning text-truncate">$ 0</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4 bg-light border">
        <div class="card-body py-2">
            <div class="row align-items-center g-2">
                <div class="col-md-4">
                    <select id="f-compras-proveedor" class="form-select form-select-sm border-0 shadow-none"
                        onchange="Ctrl_Compras.ejecutarFiltros()">
                        <option value="TODOS">-- TODOS LOS PROVEEDORES --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="f-compras-mes" class="form-select form-select-sm border-0 shadow-none"
                        onchange="Ctrl_Compras.ejecutarFiltros()">
                        <option value="TODOS">-- TODOS LOS PERIODOS --</option>
                    </select>
                </div>
                <div class="col text-end">
                    <button class="btn btn-sm btn-link text-muted p-0 text-decoration-none"
                        onclick="Ctrl_Compras.limpiarFiltros()">LIMPIAR</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-2 px-1 align-items-center">
        <div class="col-md-3">
            <div id="telemetria-compras" class="small text-muted fw-bold text-uppercase">Sincronizando...</div>
        </div>
        <div class="col-md-6 d-flex justify-content-center">
            <div id="v-compras-paginacion-top"></div>
        </div>
        <div class="col-md-3 d-flex justify-content-end align-items-center">
            <label class="small text-muted me-2 fw-bold text-uppercase">VER:</label>
            <select id="limit-compras" class="form-select form-select-sm py-0 shadow-none" style="width: 70px;"
                onchange="Ctrl_Compras.cambiarLimite(this.value)">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
    </div>

    <div class="accordion accordion-flush shadow-sm rounded border bg-white overflow-hidden" id="v-compras-acordeon">
    </div>

    <div class="d-flex justify-content-center mt-3" id="v-compras-paginacion-bottom"></div>

    <div id="v-compras-modales" class="d-none">
        <div class="modal fade" id="modal-prov-info" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-md modal-dialog-centered">
                <div id="modal-prov-content" class="modal-content border-0 shadow-lg"></div>
            </div>
        </div>

        <div class="modal fade" id="modal-folio-detalle" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div id="modal-folio-content" class="modal-content border-0 shadow-lg"></div>
            </div>
        </div>
    </div>
</div>
