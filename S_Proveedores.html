<script>
    /**
     * @file S_Proveedores.html
     * @version 1.15.0
     * @description Maestro de Proveedores. Arquitectura Relacional Estricta (Eliminación de CATALOGO_JSON).
     */

    window.Ctrl_Proveedores = {
        meta: { id: 'proveedores', version: '1.15.0', titulo: 'Maestro de Proveedores', tematica: 'Inventario', seguridad: { permisos: ['proveedores', '*'], nivel_acceso: 1 } },
        estado: { filtroBusqueda: '', filtroISO: '', filtroSys: 'ACTIVO', limiteFilas: 15, listenerActivo: false },

        init: function () {
            if (!this.estado.listenerActivo) {
                window.addEventListener('erp-datos-listos', () => {
                    if (window.SISTEMA_ERP && window.SISTEMA_ERP.moduloActual === this.meta.id) {
                        this.render();
                    }
                });
                this.estado.listenerActivo = true;
            }
        },

        setFiltro: function (key, val) {
            if (key === 'busqueda') this.estado.filtroBusqueda = String(val).toLowerCase();
            if (key === 'iso') this.estado.filtroISO = val;
            if (key === 'sys') this.estado.filtroSys = val;
            if (key === 'limite') this.estado.limiteFilas = parseInt(val);
            this.render();
        },

        render: function () {
            if (!window.SISTEMA_ERP?.datos || !window.CONFIG?.DB) return;

            const raw = window.SISTEMA_ERP.datos[window.CONFIG.DB.PROVEEDORES];
            if (!raw || !Array.isArray(raw)) return;

            // PRE-CÁLCULO DE ÚLTIMAS COMPRAS
            const compras = window.SISTEMA_ERP.datos[window.CONFIG.DB.COMPRAS] || [];
            const ultimasCompras = {};
            compras.forEach(c => {
                const r = String(c.RUT_EMISOR).replace(/\./g, '').trim().toUpperCase();
                const f = new Date(c.FECHA_EMISION);

                if (!ultimasCompras[r] || f > (ultimasCompras[r].fecha || 0)) {
                    ultimasCompras[r] = {
                        fecha: f,
                        monto: c.MONTO_TOTAL,
                        fechaUI: window.ERP_Utils.formatearFecha(c.FECHA_EMISION)
                    };
                }
            });

            // FILTRADO ESTRICTO SEGÚN URS-28
            const dataFiltrada = raw.filter(p => {
                const bRUT = String(p.RUT_ENTIDAD || '').toLowerCase();
                const bNombre = String(p.RAZON_SOCIAL || '').toLowerCase();
                const fISO = String(p.ISO_RIESGO || '');
                const fSys = String(p.STATUS || 'ACTIVO');

                const matchBusqueda = bRUT.includes(this.estado.filtroBusqueda) || bNombre.includes(this.estado.filtroBusqueda);
                const matchISO = this.estado.filtroISO === '' || fISO === this.estado.filtroISO;
                const matchSys = fSys === this.estado.filtroSys;

                return matchBusqueda && matchISO && matchSys;
            });

            if (window.Factory && typeof window.Factory.crearTabla === 'function') {
                window.Factory.crearTabla('v-proveedores-contenedor-principal', {
                    data: dataFiltrada,
                    idKey: 'RUT_ENTIDAD',
                    onEdit: (rut) => window.Ctrl_Proveedores.abrirModalCRUD(rut),
                    config: {
                        rowsPerPage: this.estado.limiteFilas,
                        pagination: true,
                        columnasCRUD: true
                    },
                    columns: [
                        {
                            label: 'Identidad Tributaria', key: 'RUT_ENTIDAD',
                            render: (v, r) => `
                                <div class="d-flex flex-column">
                                    <span class="fw-bold text-dark text-uppercase">${String(r.RAZON_SOCIAL || 'SIN NOMBRE')}</span>
                                    <span class="font-monospace small text-muted">${v}</span>
                                </div>`
                        },
                        {
                            label: 'Inocuidad (ISO)', key: 'ISO_RIESGO',
                            render: (v) => {
                                const st = String(v || 'EVALUACION');
                                let bg = st === 'ACTIVO' ? 'bg-success' : (st === 'BLOQUEADO' ? 'bg-danger pulse' : 'bg-warning text-dark');
                                return `<span class="badge ${bg} shadow-sm border font-monospace extra-small">${st}</span>`;
                            }
                        },
                        {
                            label: 'Última Compra (DTE)', key: 'RUT_ENTIDAD',
                            render: (v) => {
                                const rutLimpio = String(v).replace(/\./g, '').trim().toUpperCase();
                                const uc = ultimasCompras[rutLimpio];
                                if (!uc) return `<span class="small text-muted fst-italic">Sin historial</span>`;
                                return `
                                <div class="d-flex flex-column">
                                    <span class="fw-bold text-success small">$${Number(uc.monto).toLocaleString('es-CL')}</span>
                                    <span class="small text-muted extra-small fw-bold"><i class="bi bi-calendar3 me-1"></i>${uc.fechaUI}</span>
                                </div>`;
                            }
                        },
                        {
                            label: 'Análisis', key: 'RUT_ENTIDAD',
                            render: (v) => `
                                <button class="btn btn-sm btn-dark fw-bold rounded-pill shadow-sm px-3 py-1 extra-small" 
                                    onclick="window.Ctrl_Proveedores.abrirFicha360('${v}')">
                                    <i class="bi bi-radar me-1"></i> FICHA 360°
                                </button>`
                        }
                    ]
                });
            }
        },

        abrirFicha360: function (rut) {
            const db = window.SISTEMA_ERP.datos;
            const cnf = window.CONFIG.DB;

            const prov = (db[cnf.PROVEEDORES] || []).find(p => p.RUT_ENTIDAD === rut);
            if (!prov) return window.ERP_Utils.mostrarToast("Proveedor no encontrado.", "danger");

            const rutLimpio = rut.replace(/\./g, '').trim().toUpperCase();

            // Extracción Financiera
            const compras = (db[cnf.COMPRAS] || []).filter(c =>
                String(c.RUT_EMISOR).replace(/\./g, '').trim().toUpperCase() === rutLimpio
            );
            const uuidsCompras = compras.map(c => c.ID_UUID);

            const cxpList = (db[cnf.CXP] || []).filter(cxp =>
                String(cxp.RUT_PROVEEDOR || '').replace(/\./g, '').trim().toUpperCase() === rutLimpio ||
                uuidsCompras.includes(cxp.ID_FACTURA)
            );
            const deudaTotal = cxpList.reduce((acc, cur) => acc + (String(cur.ESTADO_PAGO) !== 'PAGADO' ? Number(cur.MONTO_DEUDA || 0) : 0), 0);
            const volumenTotalHist = compras.reduce((acc, c) => acc + Number(c.MONTO_TOTAL || 0), 0);

            // Motor Vectorial
            const hoy = new Date();
            const arrMeses = [];
            const mapaVentana = {};
            const nombresMeses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

            for (let i = 11; i >= 0; i--) {
                const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
                const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                const etiqueta = `${nombresMeses[d.getMonth()]} ${String(d.getFullYear()).slice(-2)}`;
                mapaVentana[k] = { label: etiqueta, total: 0 };
                arrMeses.push(k);
            }

            compras.forEach(c => {
                const f = new Date(c.FECHA_EMISION);
                if (!isNaN(f.getTime())) {
                    const k = `${f.getFullYear()}-${String(f.getMonth() + 1).padStart(2, '0')}`;
                    if (mapaVentana[k] !== undefined) {
                        mapaVentana[k].total += Number(c.MONTO_TOTAL || 0);
                    }
                }
            });

            const datosGrafico = arrMeses.map(k => mapaVentana[k]);
            const maxVal = Math.max(...datosGrafico.map(d => d.total));
            const viewWidth = 800;
            const viewHeight = 120;
            const paddingX = 40;
            const stepX = (viewWidth - paddingX * 2) / 11;

            let pathLines = "";
            let dataPoints = "";
            let textLabels = "";

            datosGrafico.forEach((d, idx) => {
                const x = paddingX + (idx * stepX);
                const y = maxVal === 0 ? viewHeight : viewHeight - ((d.total / maxVal) * (viewHeight - 20));

                pathLines += `${x},${y} `;

                textLabels += `<text x="${x}" y="${viewHeight + 20}" font-size="11" text-anchor="middle" fill="#6c757d" font-family="monospace">${d.label}</text>`;

                if (d.total > 0) {
                    dataPoints += `<circle cx="${x}" cy="${y}" r="4" fill="#0d6efd" stroke="#fff" stroke-width="1.5"><title>${d.label}: $${Math.round(d.total).toLocaleString('es-CL')}</title></circle>`;
                    textLabels += `<text x="${x}" y="${y - 10}" font-size="10" text-anchor="middle" fill="#198754" font-weight="bold" font-family="monospace">$${Math.round(d.total / 1000)}k</text>`;
                } else {
                    dataPoints += `<circle cx="${x}" cy="${y}" r="3" fill="#dee2e6"><title>${d.label}: Sin operaciones</title></circle>`;
                }
            });

            const graficoRender = `
                <div class="card border border-light shadow-sm w-100">
                    <div class="card-body p-3">
                        <label class="extra-small fw-bold text-muted text-uppercase d-block mb-3"><i class="bi bi-graph-up text-primary me-2"></i>Tendencia de Inversión (12 Meses Móviles)</label>
                        <div style="width: 100%; overflow-x: auto; overflow-y: hidden;">
                            <svg viewBox="0 0 ${viewWidth} ${viewHeight + 30}" preserveAspectRatio="xMidYMid meet" style="width: 100%; height: 100%; min-width: 600px;">
                                <line x1="${paddingX}" y1="${viewHeight}" x2="${viewWidth - paddingX}" y2="${viewHeight}" stroke="#e9ecef" stroke-width="2" />
                                <polyline points="${pathLines.trim()}" fill="none" stroke="#0d6efd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                ${textLabels}
                                ${dataPoints}
                            </svg>
                        </div>
                    </div>
                </div>
            `;

            // 🚀 CRUCE RELACIONAL (ÚNICA FUENTE DE LA VERDAD PARA CATÁLOGO Y ALÉRGENOS)
            const itemsRelacionales = (db[cnf.ITEMS] || []).filter(i =>
                String(i.RUT_PROV_PREFERENTE || '').replace(/\./g, '').trim().toUpperCase() === rutLimpio
            );

            const itemsConAlergenos = itemsRelacionales.filter(i => {
                const a = String(i.ISO_ALERGENOS || 'NO DECLARADOS').toUpperCase().trim();
                return (a !== 'NO' && a !== 'NO DECLARADOS' && a !== '');
            });

            let alergenosRender = '';
            if (itemsRelacionales.length === 0) {
                alergenosRender = '<span class="text-muted fst-italic extra-small">Sin catálogo cruzado en tabla MAESTRO_ITEMS</span>';
            } else if (itemsConAlergenos.length === 0) {
                alergenosRender = '<span class="text-muted fst-italic fw-bold extra-small">No declara alérgenos</span>';
            } else {
                const listaItems = itemsConAlergenos.map(i => {
                    const alerg = String(i.ISO_ALERGENOS).toUpperCase().trim();
                    return `<li class="mb-1"><span class="text-secondary extra-small fw-bold me-1">${i.NOMBRE_TECNICO || i.SKU_INTERNO || 'S/N'}:</span> <span class="badge bg-danger extra-small">${alerg}</span></li>`;
                }).join('');
                alergenosRender = `<ul class="list-unstyled mb-0 mt-1" style="max-height: 120px; overflow-y: auto;">${listaItems}</ul>`;
            }

            const bodyId = window.Factory.abrirModal({
                titulo: `Análisis 360°: ${prov.RAZON_SOCIAL}`,
                tamaño: 'modal-xl'
            });

            document.getElementById(bodyId).innerHTML = `
            <div class="p-4 bg-white" style="overflow-x: hidden;">
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <div class="card border-secondary shadow-sm h-100 p-3 bg-light text-center">
                            <label class="extra-small fw-bold text-muted text-uppercase d-block">Documentos en Libro</label>
                            <span class="fs-4 fw-bold text-dark">${compras.length} DTEs</span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-success shadow-sm h-100 p-3 bg-light text-center">
                            <label class="extra-small fw-bold text-muted text-uppercase d-block">Volumen Histórico (Total)</label>
                            <span class="fs-4 fw-bold text-success">$${Math.round(volumenTotalHist).toLocaleString('es-CL')}</span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-info shadow-sm h-100 p-3 bg-light text-center">
                            <label class="extra-small fw-bold text-muted text-uppercase d-block">Estado Inocuidad</label>
                            <span class="badge ${prov.ISO_RIESGO === 'ACTIVO' ? 'bg-success' : 'bg-danger'} fs-6 mt-1">${prov.ISO_RIESGO || 'EVAL'}</span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-danger shadow-sm h-100 p-3 bg-light text-center">
                            <label class="extra-small fw-bold text-muted text-uppercase d-block">Deuda Vigente</label>
                            <div class="fs-4 fw-bold ${deudaTotal > 0 ? 'text-danger animate__animated animate__pulse animate__infinite' : 'text-success'}">$${deudaTotal.toLocaleString('es-CL')}</div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12">
                        ${graficoRender}
                    </div>
                </div>

                <ul class="nav nav-tabs fw-bold small mb-3" id="tab360">
                    <li class="nav-item"><a class="nav-link active fw-bold" data-bs-toggle="tab" href="#p-perfil"><i class="bi bi-building me-1"></i>Perfil</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" data-bs-toggle="tab" href="#p-catalogo"><i class="bi bi-box-seam me-1"></i>Catálogo Operativo</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" data-bs-toggle="tab" href="#p-compras"><i class="bi bi-receipt me-1"></i>Facturas</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" data-bs-toggle="tab" href="#p-finanzas"><i class="bi bi-cash-stack me-1"></i>Finanzas (CxP)</a></li>
                </ul>

                <div class="tab-content pt-2">
                    <div class="tab-pane fade show active" id="p-perfil">
                        <div class="row g-3">
                            <div class="col-md-7">
                                <h6 class="fw-bold small border-bottom pb-2">Identidad y Giro</h6>
                                <table class="table table-sm table-borderless small">
                                    <tr><td class="text-muted fw-bold w-25">RUT:</td><td class="font-monospace">${prov.RUT_ENTIDAD}</td></tr>
                                    <tr><td class="text-muted fw-bold">Giro:</td><td>${prov.GIRO || '-'}</td></tr>
                                    <tr><td class="text-muted fw-bold">Dirección:</td><td>${prov.DIRECCION || '-'}</td></tr>
                                    <tr>
                                        <td class="text-muted fw-bold align-top pt-2">Matriz Alérgenos:</td>
                                        <td class="pt-2 border-top border-light">${alergenosRender}</td>
                                    </tr>
                                </table>
                            </div>
                            <div class="col-md-5">
                                <h6 class="fw-bold small border-bottom pb-2">Condiciones Comerciales</h6>
                                <div class="bg-white p-3 rounded border border-success border-opacity-25 shadow-sm">
                                    <ul class="list-unstyled mb-0 small">
                                        <li><strong class="text-secondary extra-small">PAGO:</strong> <span class="fw-bold d-block fs-6">${prov.CONDICION_PAGO || 'No registrada'}</span></li>
                                        <li><strong class="text-secondary extra-small">OBSERVACIONES:</strong> <br><span class="text-muted">${prov.OBSERVACIONES || 'Sin observaciones preventivas'}</span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="p-catalogo">
                        <div class="table-responsive rounded border shadow-sm" style="max-height: 350px;">
                            <table class="table table-sm table-hover mb-0 small align-middle">
                                <thead class="table-dark sticky-top">
                                    <tr>
                                        <th style="width: 15%">SKU Interno</th>
                                        <th style="width: 45%">Nombre Técnico</th>
                                        <th class="text-center" style="width: 20%">Tipo Ítem</th>
                                        <th class="text-center" style="width: 20%">Estado Operativo</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${itemsRelacionales.length === 0 ? '<tr><td colspan="4" class="text-center py-4 text-muted fst-italic">No hay ítems vinculados a este proveedor en el Maestro de Ítems.</td></tr>' :
                    itemsRelacionales.map(item => {
                        const sku = item.SKU_INTERNO || item.ID_ITEM || 'S/N';
                        const nombre = item.NOMBRE_TECNICO || item.DESCRIPCION || 'Sin descripción';

                        // 🚀 NUEVO MAPEO: TIPO_ITEM
                        const tipoItem = String(item.TIPO_ITEM || 'NO DEFINIDO').toUpperCase();
                        const estado = String(item.STATUS || 'ACTIVO').toUpperCase();

                        // Estilos visuales
                        const badgeTipo = 'bg-info text-dark border border-info';
                        const badgeEstado = estado === 'ACTIVO' ? 'bg-success' : 'bg-secondary';

                        return `
                                        <tr>
                                            <td class="font-monospace fw-bold text-secondary ps-2">${sku}</td>
                                            <td class="fw-bold text-uppercase">${nombre}</td>
                                            <td class="text-center"><span class="badge ${badgeTipo} extra-small">${tipoItem}</span></td>
                                            <td class="text-center"><span class="badge ${badgeEstado} extra-small">${estado}</span></td>
                                        </tr>`;
                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="p-compras">
                        <div class="table-responsive rounded border shadow-sm" style="max-height: 350px;">
                            <table class="table table-sm table-hover mb-0 small">
                                <thead class="table-dark sticky-top">
                                    <tr><th>Fecha</th><th>Folio</th><th>Tipo</th><th>Total (Bruto)</th><th class="text-center">Acción</th></tr>
                                </thead>
                                <tbody>
                                    ${compras.length === 0 ? '<tr><td colspan="5" class="text-center py-4 text-muted">Sin compras registradas.</td></tr>' :
                    compras.sort((a, b) => new Date(b.FECHA_EMISION) - new Date(a.FECHA_EMISION)).map(c => `
                                        <tr>
                                            <td class="ps-3 font-monospace fw-bold text-secondary">${window.ERP_Utils.formatearFecha(c.FECHA_EMISION)}</td>
                                            <td class="fw-bold text-primary">#${c.FOLIO}</td>
                                            <td>${c.TIPO_DTE == '33' ? 'Factura' : 'Exenta'}</td>
                                            <td class="fw-bold text-success">$${Number(c.MONTO_TOTAL).toLocaleString('es-CL')}</td>
                                            <td class="text-center">
                                                <button class="btn btn-sm btn-outline-dark py-0 px-2 rounded-pill extra-small fw-bold" 
                                                    onclick="window.Ctrl_Proveedores.abrirDetalleDTE('${c.ID_UUID}', '${c.FOLIO}', '${c.RUT_EMISOR}')">
                                                    Ver Ítems
                                                </button>
                                            </td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="p-finanzas">
                        <div class="table-responsive rounded border shadow-sm" style="max-height: 350px;">
                            <table class="table table-sm table-hover mb-0 small">
                                <thead class="table-secondary sticky-top">
                                    <tr>
                                        <th class="text-center" style="width: 5%">#</th>
                                        <th style="width: 25%">Factura</th>
                                        <th style="width: 25%">Vencimiento</th>
                                        <th style="width: 25%">Monto Deuda</th>
                                        <th style="width: 20%">Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${cxpList.length === 0 ? '<tr><td colspan="5" class="text-center py-4 text-muted">Sin movimientos pendientes.</td></tr>' :
                    cxpList.map((cxp, idx) => {
                        const matchCompra = compras.find(c => c.ID_UUID === cxp.ID_FACTURA);
                        const folioRender = matchCompra ? matchCompra.FOLIO : 'S/DTE';
                        return `
                                        <tr>
                                            <td class="text-center text-muted fw-bold extra-small">${idx + 1}</td>
                                            <td class="fw-bold">#${folioRender}</td>
                                            <td>${window.ERP_Utils.formatearFecha(cxp.VENCIMIENTO)}</td>
                                            <td class="text-danger fw-bold">$${Number(cxp.MONTO_DEUDA || 0).toLocaleString('es-CL')}</td>
                                            <td><span class="badge ${cxp.ESTADO_PAGO === 'PAGADO' ? 'bg-success' : 'bg-warning text-dark'} extra-small">${cxp.ESTADO_PAGO}</span></td>
                                        </tr>`}).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>`;
        },

        abrirDetalleDTE: function (uuid, folio = null, rut = null) {
            const db = window.SISTEMA_ERP.datos;
            const cnf = window.CONFIG.DB;
            const libro = db[cnf.COMPRAS] || [];

            let dte = libro.find(c => String(c.ID_UUID) === String(uuid));
            if (!dte && folio && rut) {
                const rL = String(rut).replace(/\./g, '').trim().toUpperCase();
                dte = libro.find(c => String(c.FOLIO) === String(folio) &&
                    String(c.RUT_EMISOR).replace(/\./g, '').trim().toUpperCase() === rL);
            }

            if (!dte) return window.ERP_Utils.mostrarToast("Registro no hallado en RAM.", "danger");

            const jsonBruto = dte.DETALLE_JSON || "";
            let htmlBody = "";

            if (!jsonBruto || jsonBruto.length < 5) {
                htmlBody = `
                <div class="p-5 text-center">
                    <i class="bi bi-file-earmark-medical text-muted display-1"></i>
                    <h5 class="mt-3 fw-bold">Sin Detalle de Ítems</h5>
                    <p class="text-muted small">El DTE #${dte.FOLIO} no tiene datos de productos guardados en JSON.</p>
                </div>`;
            } else {
                try {
                    const items = JSON.parse(jsonBruto);
                    htmlBody = `
                    <div class="p-2">
                        <div class="table-responsive rounded border shadow-sm">
                            <table class="table table-sm table-striped mb-0 small align-middle">
                                <thead class="table-dark text-nowrap">
                                    <tr>
                                        <th class="text-center" style="width: 5%">#</th>
                                        <th style="width: 45%">Producto</th>
                                        <th class="text-center" style="width: 15%">Cant.</th>
                                        <th class="text-end" style="width: 15%">Neto Unitario</th>
                                        <th class="text-end pe-3" style="width: 20%">Subtotal Neto</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${items.map((i, idx) => {
                        const cant = Number(i.cantidad || 1);
                        const fallbackSubtotal = Number(i.subtotal || i.monto || 0);
                        let precioUnit = Number(i.precio || i.precio_unitario || 0);

                        if (precioUnit === 0 && fallbackSubtotal > 0) {
                            precioUnit = fallbackSubtotal / cant;
                        }

                        const subNetoCalc = cant * precioUnit;

                        return `
                                        <tr>
                                            <td class="text-center text-muted fw-bold extra-small">${idx + 1}</td>
                                            <td class="ps-2 fw-bold text-uppercase">${i.nombre || i.descripcion || 'S/N'}</td>
                                            <td class="text-center font-monospace">${cant} ${i.unidad || 'UN'}</td>
                                            <td class="text-end font-monospace text-secondary">$${precioUnit.toLocaleString('es-CL', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}</td>
                                            <td class="text-end pe-3 fw-bold text-success font-monospace">$${Math.round(subNetoCalc).toLocaleString('es-CL')}</td>
                                        </tr>`;
                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                } catch (e) {
                    htmlBody = `<div class="p-4 small text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Error de parseo JSON en DETALLE_JSON.</div>`;
                }
            }

            window.ERP_Utils.abrirModalDinamico(`<i class="bi bi-box-seam me-2"></i>Folio #${dte.FOLIO} | Desglose Analítico`, htmlBody, 'modal-lg');
        },

        validarRutM11: function (rut) {
            if (!rut) return false;
            let valor = rut.replace(/\./g, '').replace('-', '');
            let cuerpo = valor.slice(0, -1);
            let dv = valor.slice(-1).toUpperCase();
            if (cuerpo.length < 7) return false;
            let suma = 0; let multiplo = 2;
            for (let i = 1; i <= cuerpo.length; i++) {
                suma = suma + (multiplo * valor.charAt(cuerpo.length - i));
                multiplo = (multiplo < 7) ? multiplo + 1 : 2;
            }
            let dvEsperado = 11 - (suma % 11);
            dv = (dv == 'K') ? 10 : (dv == 0 ? 11 : dv);
            if (dvEsperado == 11) dvEsperado = 0;
            if (dvEsperado == 10) dvEsperado = 'K';
            return String(dvEsperado) === String(dv);
        },

        formatearRutUI: function (input) {
            let valor = input.value.replace(/[^0-9kK]/g, '');
            if (valor.length > 1) {
                let cuerpo = valor.slice(0, -1);
                let dv = valor.slice(-1).toUpperCase();
                input.value = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '-' + dv;
            }
            if (valor.length >= 8) {
                const isValid = this.validarRutM11(input.value);
                input.classList.toggle('is-valid', isValid);
                input.classList.toggle('is-invalid', !isValid);
            }
        },

        abrirModalCRUD: function (rutEditar = null) {
            let p = { RUT_ENTIDAD: '', RAZON_SOCIAL: '', GIRO: '', DIRECCION: '', EMAIL: '', TELEFONO: '', ISO_RIESGO: 'EVALUACION', CONDICION_PAGO: '', OBSERVACIONES: '', PERFIL_JSON: '' };
            let esEdicion = false;

            if (rutEditar) {
                const existe = (window.SISTEMA_ERP.datos[window.CONFIG.DB.PROVEEDORES] || []).find(x => x.RUT_ENTIDAD === rutEditar);
                if (existe) { p = { ...existe }; esEdicion = true; }
            }

            let perfilObj = { proveedor_items: false };
            if (p.PERFIL_JSON && typeof p.PERFIL_JSON === 'string' && p.PERFIL_JSON.trim() !== '') {
                try {
                    perfilObj = JSON.parse(p.PERFIL_JSON);
                } catch (e) {
                    console.warn("[Seguridad] PERFIL_JSON corrupto o nulo. Se asume estado neutro.");
                }
            }

            const bodyId = window.Factory.abrirModal({
                titulo: esEdicion ? `<i class="bi bi-pencil-square me-2"></i>Editar Proveedor` : `<i class="bi bi-building-add me-2"></i>Alta de Proveedor`,
                tamaño: 'modal-lg'
            });

            document.getElementById(bodyId).innerHTML = `
            <form id="form-prov-crud" class="p-4" onsubmit="event.preventDefault(); window.Ctrl_Proveedores.guardarProveedor(${esEdicion});">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">RUT Comercial *</label>
                        <input type="text" id="prov_rut" class="form-control font-monospace fw-bold" required value="${p.RUT_ENTIDAD}" ${esEdicion ? 'readonly' : 'onkeyup="window.Ctrl_Proveedores.formatearRutUI(this)"'}>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label small fw-bold">Razón Social *</label>
                        <input type="text" id="prov_nombre" class="form-control text-uppercase" required value="${p.RAZON_SOCIAL}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Giro</label>
                        <input type="text" id="prov_giro" class="form-control text-uppercase" value="${p.GIRO || ''}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Dirección</label>
                        <input type="text" id="prov_dir" class="form-control" value="${p.DIRECCION || ''}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Email de Contacto</label>
                        <input type="email" id="prov_email" class="form-control" value="${p.EMAIL || ''}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Estado Inocuidad (ISO)</label>
                        <select id="prov_iso_riesgo" class="form-select">
                            <option value="EVALUACION" ${p.ISO_RIESGO === 'EVALUACION' ? 'selected' : ''}>En Evaluación</option>
                            <option value="ACTIVO" ${p.ISO_RIESGO === 'ACTIVO' ? 'selected' : ''}>Activo (Aprobado)</option>
                            <option value="BLOQUEADO" ${p.ISO_RIESGO === 'BLOQUEADO' ? 'selected' : ''}>Bloqueado</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Condición de Pago</label>
                        <input type="text" id="prov_condicion_pago" class="form-control" value="${p.CONDICION_PAGO || ''}" placeholder="Ej: Contado, 30 Días, etc.">
                    </div>
                    
                    <div class="col-md-6 d-flex align-items-end pb-1">
                        <div class="form-check form-switch fs-6 mb-1">
                            <input class="form-check-input" type="checkbox" role="switch" id="prov_items_switch" ${perfilObj.proveedor_items ? 'checked' : ''}>
                            <label class="form-check-label small fw-bold text-secondary" for="prov_items_switch">Habilitar como Proveedor de Ítems / M.P.</label>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Observaciones Preventivas</label>
                        <textarea id="prov_observaciones" class="form-control" rows="2" placeholder="Información relevante de control...">${p.OBSERVACIONES || ''}</textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-end mt-4 gap-2">
                    <button type="button" class="btn btn-light border fw-bold" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary fw-bold" id="btn-save-prov">Guardar Entidad</button>
                </div>
            </form>`;
        },

        guardarProveedor: function (esEdicion) {
            const rutInput = document.getElementById('prov_rut');
            if (!esEdicion && !this.validarRutM11(rutInput.value)) return window.ERP_Utils.mostrarToast("RUT Inválido. Operación abortada.", "danger");

            const btn = document.getElementById('btn-save-prov');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando...';

            const payload = {
                RUT_ENTIDAD: rutInput.value.trim(),
                RAZON_SOCIAL: document.getElementById('prov_nombre').value.trim().toUpperCase(),
                GIRO: document.getElementById('prov_giro').value.trim().toUpperCase(),
                DIRECCION: document.getElementById('prov_dir').value.trim(),
                EMAIL: document.getElementById('prov_email').value.trim(),
                ISO_RIESGO: document.getElementById('prov_iso_riesgo').value,
                CONDICION_PAGO: document.getElementById('prov_condicion_pago').value.trim(),
                OBSERVACIONES: document.getElementById('prov_observaciones').value.trim(),
                STATUS: 'ACTIVO'
            };

            const isProvItems = document.getElementById('prov_items_switch').checked;
            const perfilCompilado = { proveedor_items: isProvItems };
            payload.PERFIL_JSON = JSON.stringify(perfilCompilado);

            const idRegistro = esEdicion ? payload.RUT_ENTIDAD : 'NUEVO';
            const ipCliente = window.SISTEMA_ERP.ipCliente || '0.0.0.0';

            google.script.run
                .withSuccessHandler((res) => {
                    let respuesta = res;
                    try { if (typeof res === 'string') respuesta = JSON.parse(res); } catch (e) { }

                    if (respuesta.error) {
                        window.ERP_Utils.mostrarToast("Falla de Transacción: " + respuesta.message, "danger");
                        btn.disabled = false;
                        btn.innerHTML = "Guardar Entidad";
                        return;
                    }

                    window.ERP_Utils.mostrarToast("Registro consolidado y auditado con éxito.", "success");
                    bootstrap.Modal.getInstance(document.querySelector('.modal.show')).hide();
                    window.ERP_Utils.recargaSilenciosa();
                })
                .withFailureHandler((err) => {
                    window.ERP_Utils.mostrarToast("Falla Crítica: Desconexión del Motor V8.", "danger");
                    btn.disabled = false;
                    btn.innerHTML = "Guardar Entidad";
                })
                .w_EjecutarTransaccionSegura('PROVEEDORES', idRegistro, payload, ipCliente);
        }
    };
</script>
