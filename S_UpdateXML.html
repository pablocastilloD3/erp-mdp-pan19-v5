<script>
    /**
     * @file S_UpdateXML.html
     * @version 3.0.0
     * @description Frontend Batch Final: UX Asíncrono, Sanitización XML Extrema, Impuestos/Exento y Granel.
     */

    window.Ctrl_UpdateXML = {
        meta: { id: 'updatexml', version: '3.0.0', titulo: 'Integración DTE' },
        estado: { loteProcesado: [], alertasBloqueantes: 0, abortar: false, simuladorUI: null },

        init: function () { },
        render: function () {
            document.getElementById('v-updatexml-resultado-prevuelo').innerHTML = `
        <div class="text-center text-muted p-5 border border-dashed rounded">
          <i class="bi bi-files display-1 opacity-25"></i><p class="mt-3">Seleccione archivos (XML) para iniciar.</p>
        </div>`;
            this.mostrarBotonesControl(false);
            this.actualizarProgreso(0, "Esperando archivos...");

            const progressContainer = document.getElementById('dte-progress-bar')?.parentElement;
            if (progressContainer) progressContainer.classList.remove('d-none');
        },

        mostrarBotonesControl: function (mostrar) {
            const panel = document.getElementById('panel-controles-lote');
            mostrar ? panel.classList.remove('d-none') : panel.classList.add('d-none');
        },

        actualizarProgreso: function (porcentaje, texto) {
            const barra = document.getElementById('dte-progress-bar');
            const lbl = document.getElementById('dte-progress-text');
            if (barra) barra.style.width = `${porcentaje}%`;
            if (lbl) lbl.innerText = texto;
        },

        _sugerirConversion: function (cantCruda, undCruda, nombreItem) {
            let cant = Number(cantCruda) || 0;
            let und = String(undCruda || 'UN').toUpperCase().trim();
            let modificado = false;
            const original = { cant: cant, und: und };

            if (und === 'UN' && (cant % 1 !== 0)) {
                const nom = String(nombreItem).toUpperCase();
                und = (nom.includes('LITRO') || nom.includes('ACEITE') || nom.includes('LECHE') || nom.includes('JUGO')) ? 'LT' : 'KG';
                modificado = true;
            }
            if (['GR', 'GRS', 'GRAMO', 'GRAMOS', 'G'].includes(und)) {
                cant = cant / 1000; und = 'KG'; modificado = true;
            } else if (['ML', 'CC'].includes(und)) {
                cant = cant / 1000; und = 'LT'; modificado = true;
            } else if (['TON', 'TONELADA'].includes(und)) {
                cant = cant * 1000; und = 'KG'; modificado = true;
            }
            return { cantOriginal: original.cant, undOriginal: original.und, cantSugerida: cant, undSugerida: und, modificado: modificado };
        },

        procesarArchivosLote: async function () {
            const inputFiles = document.getElementById('file-dte-lote').files;
            if (inputFiles.length === 0) return window.ERP_Utils.mostrarToast("Seleccione al menos un archivo.", "warning");
            window.ERP_Utils.mostrarLoading(true);
            this.estado.loteProcesado = [];
            this.estado.alertasBloqueantes = 0;

            for (let i = 0; i < inputFiles.length; i++) {
                if (inputFiles[i].name.toLowerCase().endsWith('.xml')) await this._procesarUnXML(inputFiles[i]);
            }
            this._ejecutarPreVueloAgrupado();
        },

        _procesarUnXML: function (file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    let text = new TextDecoder("iso-8859-1").decode(e.target.result);
                    if (/encoding\s*=\s*['"]utf-8['"]/i.test(text)) text = new TextDecoder("utf-8").decode(e.target.result);

                    // 🚀 SANITIZACIÓN: Exorcismo de tags XML intrusos
                    const cleanText = text
                        .replace(/xmlns(:\w+)?="[^"]*"/g, '')
                        .replace(/<\?xml.*?\?>/g, '');

                    try {
                        const xmlDoc = new DOMParser().parseFromString(cleanText, "text/xml");
                        const getTag = (t) => xmlDoc.getElementsByTagName(t)[0]?.textContent || '';

                        // 🚀 CAPTURA: Impuestos Adicionales (Harina, ILA)
                        let montoOtrosImp = 0;
                        const nodosImp = xmlDoc.getElementsByTagName('ImptoReten');
                        for (let k = 0; k < nodosImp.length; k++) {
                            montoOtrosImp += Number(nodosImp[k].getElementsByTagName('MontoImp')[0]?.textContent || 0);
                        }

                        const dte = {
                            archivo: file.name,
                            tipoDTE: getTag('TipoDTE') || '33',
                            rutEmisor: getTag('RUTEmisor'),
                            razonSocial: getTag('RznSoc'),
                            folio: getTag('Folio'),
                            fechaEmision: getTag('FchEmis'),
                            fechaVencimiento: getTag('FchVenc') || getTag('FchEmis'),
                            montoNeto: getTag('MntNeto'),
                            montoExento: getTag('MntExe') || '0', // 🚀 NUEVO: Captura de Exento para DTE 34
                            montoIva: getTag('IVA'),
                            montoOtrosImpuestos: montoOtrosImp,
                            montoTotal: getTag('MntTotal'),
                            items: [], xmlRaw: text,
                            requiereRevisionGranel: false
                        };

                        const nodosDetalle = xmlDoc.getElementsByTagName('Detalle');
                        for (let j = 0; j < nodosDetalle.length; j++) {
                            dte.items.push({
                                idx: j,
                                codigo: nodosDetalle[j].getElementsByTagName('VlrCodigo')[0]?.textContent || `GEN-${Math.random().toString(36).substr(2, 5)}`,
                                nombre: nodosDetalle[j].getElementsByTagName('NmbItem')[0]?.textContent || 'Sin Nombre',
                                descripcion: nodosDetalle[j].getElementsByTagName('DscItem')[0]?.textContent || '',
                                cantidad: nodosDetalle[j].getElementsByTagName('QtyItem')[0]?.textContent || 1,
                                unidad: nodosDetalle[j].getElementsByTagName('UnmdItem')[0]?.textContent || 'UN',
                                precio: nodosDetalle[j].getElementsByTagName('PrcItem')[0]?.textContent || 0,
                                alergenosDetectados: []
                            });
                        }
                        if (dte.rutEmisor) this.estado.loteProcesado.push(dte);
                    } catch (err) {
                        console.error("Fallo crítico al parsear XML: ", file.name, err);
                    }
                    resolve();
                };
                reader.readAsArrayBuffer(file);
            });
        },

        _ejecutarPreVueloAgrupado: function () {
            let matrizAlergenos = {};
            try {
                const configs = window.SISTEMA_ERP.datos['SYS_CONFIG'] || [];
                const row = configs.find(c => c.PARAM_KEY === 'MATRIZ_ALERGENOS');
                if (row && row.PARAM_VALUE) matrizAlergenos = JSON.parse(row.PARAM_VALUE);
            } catch (e) { console.warn("⚠️ No se pudo cargar MATRIZ_ALERGENOS"); }

            const agrupados = {};
            this.estado.loteProcesado.forEach(dte => {
                dte.items.forEach(item => {
                    const nombreUpper = String(item.nombre).toUpperCase();
                    for (const [categoria, keywords] of Object.entries(matrizAlergenos)) {
                        if (keywords.some(k => nombreUpper.includes(k))) {
                            if (!item.alergenosDetectados.includes(categoria)) item.alergenosDetectados.push(categoria);
                        }
                    }
                    item.conversion = this._sugerirConversion(item.cantidad, item.unidad, item.nombre);
                    if (item.conversion.modificado) dte.requiereRevisionGranel = true;
                });

                const rutLimpio = String(dte.rutEmisor).replace(/\./g, '').trim().toUpperCase();
                const folioNum = String(Number(dte.folio));
                const dbCompras = window.SISTEMA_ERP.datos['LIBRO_COMPRAS'] || [];

                dte.existe = dbCompras.some(f =>
                    String(f.RUT_EMISOR).replace(/\./g, '').trim().toUpperCase() === rutLimpio &&
                    String(f.FOLIO).trim() === folioNum
                );

                if (dte.existe) this.estado.alertasBloqueantes++;
                if (!agrupados[dte.rutEmisor]) agrupados[dte.rutEmisor] = { razonSocial: dte.razonSocial, dtes: [] };
                agrupados[dte.rutEmisor].dtes.push(dte);
            });
            this._renderizarTablaAgrupada(agrupados);
        },

        _renderizarTablaAgrupada: function (agrupados) {
            window.ERP_Utils.mostrarLoading(false);
            let html = '';
            for (const [rut, grupo] of Object.entries(agrupados)) {
                html += `<div class="card mb-3 border-secondary shadow-sm">
                  <div class="card-header bg-dark text-white fw-bold"><span><i class="bi bi-building me-2"></i>${grupo.razonSocial}</span></div>
                  <ul class="list-group list-group-flush">`;

                grupo.dtes.forEach(dte => {
                    const tieneAlergeno = dte.items.some(i => i.alergenosDetectados.length > 0);
                    const safeRut = String(dte.rutEmisor).replace(/[^a-zA-Z0-9]/g, '');
                    const idHtml = `dte-row-${safeRut}-${dte.folio}`;

                    let bloqueRevision = '';
                    if (dte.requiereRevisionGranel && !dte.existe) {
                        bloqueRevision = `<div class="mt-2 p-2 bg-light border border-info rounded small shadow-inner">
                            <strong class="text-info-emphasis"><i class="bi bi-info-circle me-1"></i>Conversión de Granel Sugerida:</strong><br>`;

                        dte.items.forEach(item => {
                            if (item.conversion.modificado) {
                                const idInputCant = `cant-${safeRut}-${dte.folio}-${item.idx}`;
                                const idInputUnd = `und-${safeRut}-${dte.folio}-${item.idx}`;
                                bloqueRevision += `
                                <div class="d-flex align-items-center mt-2 border-bottom pb-1 border-opacity-25">
                                    <span class="text-truncate fw-bold me-2" style="max-width: 180px;" title="${item.nombre}">${item.nombre}</span>
                                    <span class="text-muted text-decoration-line-through me-2">${item.conversion.cantOriginal} ${item.conversion.undOriginal}</span>
                                    <i class="bi bi-arrow-right text-primary me-2 fw-bold"></i>
                                    <input type="number" id="${idInputCant}" class="form-control form-control-sm border-primary text-primary fw-bold w-25 me-1" value="${item.conversion.cantSugerida}" step="any">
                                    <select id="${idInputUnd}" class="form-select form-select-sm border-primary text-primary fw-bold w-25">
                                        <option value="KG" ${item.conversion.undSugerida === 'KG' ? 'selected' : ''}>KG</option>
                                        <option value="LT" ${item.conversion.undSugerida === 'LT' ? 'selected' : ''}>LT</option>
                                        <option value="UN" ${item.conversion.undSugerida === 'UN' ? 'selected' : ''}>UN</option>
                                    </select>
                                </div>`;
                            }
                        });
                        bloqueRevision += `</div>`;
                    }

                    html += `<li id="${idHtml}" class="list-group-item d-flex flex-column ${dte.existe ? 'bg-danger bg-opacity-10' : ''}">
                     <div class="d-flex justify-content-between align-items-center w-100">
                         <div><span class="fw-bold">${dte.tipoDTE == '34' ? 'Exenta' : 'Folio'}: ${dte.folio}</span> | <span class="text-success fw-bold">$${dte.montoTotal}</span></div>
                         <div>
                            ${dte.requiereRevisionGranel && !dte.existe ? `<span class="badge bg-info text-dark border border-info pulse me-1">REVISAR GRANEL</span>` : ''}
                            ${tieneAlergeno ? `<span class="badge bg-warning text-dark border border-warning pulse me-1">ALERTA ALÉRGENOS</span>` : ''}
                            ${dte.existe ? `<span class="badge bg-danger pulse">DUPLICADO</span>` : `<span class="badge bg-success">NUEVO</span>`}
                         </div>
                     </div>
                     ${bloqueRevision}
                   </li>`;
                });
                html += `</ul></div>`;
            }
            document.getElementById('v-updatexml-resultado-prevuelo').innerHTML = html;
            if (this.estado.loteProcesado.length > 0 && this.estado.alertasBloqueantes < this.estado.loteProcesado.length) {
                this.mostrarBotonesControl(true);
            }
        },

        cancelarProceso: function () {
            this.estado.abortar = true;
            document.getElementById('file-dte-lote').value = '';
            this.render();
        },

        confirmarLote: async function () {
            this.estado.abortar = false;
            this.mostrarBotonesControl(false);
            window.ERP_Utils.mostrarLoading(true);

            const dtesValidos = this.estado.loteProcesado.filter(d => !d.existe);
            const total = dtesValidos.length;

            if (total === 0) {
                window.ERP_Utils.mostrarLoading(false);
                return window.ERP_Utils.mostrarToast("No hay documentos válidos para procesar.", "warning");
            }

            dtesValidos.forEach(dte => {
                if (dte.requiereRevisionGranel) {
                    const safeRut = String(dte.rutEmisor).replace(/[^a-zA-Z0-9]/g, '');
                    dte.items.forEach(item => {
                        if (item.conversion && item.conversion.modificado) {
                            const elCant = document.getElementById(`cant-${safeRut}-${dte.folio}-${item.idx}`);
                            const elUnd = document.getElementById(`und-${safeRut}-${dte.folio}-${item.idx}`);
                            if (elCant && elUnd) {
                                item.cantidad = elCant.value;
                                item.unidad = elUnd.value;
                            }
                        }
                    });
                }
            });

            let indiceSimulado = 0;
            const msPorDocumento = Math.max(1500, Math.min(3000, 10000 / total));

            const simularProgreso = () => {
                if (indiceSimulado < total) {
                    const dte = dtesValidos[indiceSimulado];
                    const porcentaje = Math.round(((indiceSimulado + 1) / total) * 95);
                    this.actualizarProgreso(porcentaje, `Procesando [${indiceSimulado + 1}/${total}]: ${dte.razonSocial} (Folio ${dte.folio})...`);

                    const safeRut = String(dte.rutEmisor).replace(/[^a-zA-Z0-9]/g, '');
                    const idHtml = `dte-row-${safeRut}-${dte.folio}`;
                    const rowUI = document.getElementById(idHtml);
                    if (rowUI) {
                        rowUI.style.transition = "opacity 0.5s ease";
                        rowUI.style.opacity = "0";
                        setTimeout(() => rowUI.remove(), 500);
                    }
                    indiceSimulado++;
                } else {
                    this.actualizarProgreso(95, `Consolidando Certificado ISO 22000 en el servidor... Espere.`);
                    clearInterval(this.estado.simuladorUI);
                }
            };

            simularProgreso();
            this.estado.simuladorUI = setInterval(simularProgreso, msPorDocumento);

            try {
                const payload = { loteDTE: dtesValidos, ip: window.SISTEMA_ERP.ipCliente };
                const resStr = await new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).w_updatexml_procesarIntegracion(JSON.stringify(payload));
                });

                clearInterval(this.estado.simuladorUI);
                const res = JSON.parse(resStr);
                if (res.error) throw new Error(res.message);

                this.actualizarProgreso(100, `¡Proceso Finalizado Exitosamente!`);
                this._renderizarReporteLote(res.data);

            } catch (error) {
                clearInterval(this.estado.simuladorUI);
                window.ERP_Utils.mostrarLoading(false);
                window.ERP_Utils.mostrarToast(`Error crítico del servidor: ${error.message}`, "danger");
            }
        },

        _renderizarReporteLote: function (resultados) {
            document.getElementById('file-dte-lote').value = '';
            const progressContainer = document.getElementById('dte-progress-bar')?.parentElement;
            if (progressContainer) progressContainer.classList.add('d-none');

            let html = `<div class="p-3"><h4 class="fw-bold">Reporte Final de Lote</h4><p class="text-muted">Documentos Afectados: ${resultados.successes.length + resultados.errors.length}</p></div>`;

            if (resultados.errors.length > 0) {
                html += `<div class="alert alert-danger fw-bold shadow-sm">❌ ${resultados.errors.length} Documentos Rechazados</div><ul class="list-group mb-3">`;
                resultados.errors.forEach(e => html += `<li class="list-group-item text-danger"><b>${e.razonSocial} (Folio ${e.folio})</b><br><small>${e.error}</small></li>`);
                html += `</ul>`;
            }
            if (resultados.successes.length > 0) {
                html += `<div class="alert alert-success fw-bold shadow-sm">✅ ${resultados.successes.length} Documentos Integrados</div><ul class="list-group mb-3">`;
                resultados.successes.forEach(s => html += `<li class="list-group-item text-success"><b>${s.razonSocial} (Folio ${s.folio})</b> - Monto Total: $${s.montoTotal}</li>`);
                html += `</ul>`;
            }

            if (resultados.certUrl) {
                html += `<div class="text-center mt-4 mb-4">
                            <a href="${resultados.certUrl}" target="_blank" class="btn btn-primary btn-lg shadow">
                                <i class="bi bi-shield-check"></i> Ver Certificado Consolidado (ISO 22000)
                            </a>
                         </div>`;
            }

            document.getElementById('v-updatexml-resultado-prevuelo').innerHTML = html;
            window.ERP_Utils.mostrarLoading(false);

            if (resultados.successes.length > 0) {
                window.ERP_Utils.mostrarToast('Sincronizando la Base de Datos con el ERP...', 'info');
                setTimeout(() => window.ERP_Utils.recargaSilenciosa(), 2500);
            }
        }
    };
</script>
