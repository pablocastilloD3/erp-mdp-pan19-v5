<script>
    /**
     * @file S_Items.html
     * @description Controlador del Módulo Items.
     * @version 1.3.2
     * @arquitectura Memory-First, Vista Dual, Motor Nutricional, Filtro JSON.
     * @compliance URS-28, ISO 22000.
     * @reparacion [1.3.2] Cabecera de acordeón continua. Cruce avanzado con LIBRO_COMPRAS->DETALLE_JSON.
     */

    window.Ctrl_Items = {
        meta: {
            id: 'items',
            titulo: 'Maestro de Items',
            icono: 'bi-box-seam',
            tematica: 'Inventario',
            seguridad: { permisos: ['items', '*'], nivel_acceso: 1 }
        },

        estado: {
            cargado: false,
            filtroActual: 'ACTIVO',
            vistaActiva: 'lista',
            filtroProveedor: 'TODOS'
        },

        init: function () {
            if (!this.estado.cargado) {
                console.log("⚙️ [Módulo Items] Iniciando secuencias de control base...");
                this.vincularEventos();
                this.estado.cargado = true;
            }
        },

        render: function () {
            if (!window.SISTEMA_ERP.datos.MAESTRO_ITEMS) {
                console.warn("⚠️ [Módulo Items] Datos en RAM no disponibles. Abortando.");
                return;
            }
            this.construirTabla();
        },

        alternarVista: function (tipo) {
            if (this.estado.vistaActiva !== tipo) {
                this.estado.vistaActiva = tipo;
                this.estado.filtroProveedor = 'TODOS';
                this.render();
            }
        },

        filtrarPorProveedor: function (rutProveedor) {
            this.estado.filtroProveedor = rutProveedor;
            this.render();
        },

        _esProveedorDeItems: function (proveedorObj) {
            if (!proveedorObj) return false;
            if (proveedorObj.STATUS !== 'ACTIVO') return false;

            try {
                if (!proveedorObj.PERFIL_JSON) return true;
                const perfil = JSON.parse(proveedorObj.PERFIL_JSON);
                return perfil.proveedor_items !== false;
            } catch (e) {
                return true;
            }
        },

        _detectarRiesgoAlergenico: function (nombreItem, declaracionManual) {
            if (declaracionManual === 'SI') return '<span class="badge badge-critico">RIESGO DECLARADO</span>';

            const nombreLimpio = (nombreItem || "").toUpperCase();
            let riesgoDetectado = false;
            let trazabilidadRiesgo = "";

            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const paramAlergenos = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'MATRIZ_ALERGENOS');
                if (paramAlergenos && paramAlergenos.PARAM_VALUE) {
                    try {
                        const matriz = JSON.parse(paramAlergenos.PARAM_VALUE);
                        for (const [categoria, palabras] of Object.entries(matriz)) {
                            if (palabras.some(palabra => nombreLimpio.includes(palabra))) {
                                riesgoDetectado = true;
                                trazabilidadRiesgo = categoria;
                                break;
                            }
                        }
                    } catch (e) { }
                }
            }

            if (riesgoDetectado) {
                return `<span class="badge bg-warning text-dark border border-danger"><i class="bi bi-exclamation-triangle"></i> RIESGO: ${trazabilidadRiesgo}</span>`;
            }

            return '<span class="badge bg-success opacity-75">LIBRE</span>';
        },

        _agruparPorProveedor: function (datos) {
            return datos.reduce((acc, item) => {
                const rut = item.RUT_PROV_PREFERENTE || "SIN_PROVEEDOR";
                if (!acc[rut]) acc[rut] = [];
                acc[rut].push(item);
                return acc;
            }, {});
        },

        /**
         * 🕒 INTERCEPTOR DE COMPRAS (Relación LIBRO_COMPRAS -> DETALLE_JSON)
         * Extrae la FECHA_EMISION más reciente validando el "codigo" del producto.
         */
        _obtenerUltimaCompraProveedor: function (rutProveedor, itemsDelProveedor) {
            if (rutProveedor === "SIN_PROVEEDOR") return "N/D";

            let ultimaFecha = "Sin registros";

            if (window.SISTEMA_ERP.datos.LIBRO_COMPRAS) {
                // 1. Extraer SKUs y Nombres para validación cruzada rápida
                const skus = itemsDelProveedor.map(i => String(i.SKU_INTERNO).trim());
                const nombres = itemsDelProveedor.map(i => String(i.NOMBRE_TECNICO).trim().toUpperCase());

                // 2. Filtrar facturas del proveedor
                const facturas = window.SISTEMA_ERP.datos.LIBRO_COMPRAS.filter(f =>
                    f.RUT_PROVEEDOR === rutProveedor || f.RUT_EMISOR === rutProveedor
                );

                // 3. Ordenar cronológicamente (más recientes primero)
                facturas.sort((a, b) => new Date(b.FECHA_EMISION) - new Date(a.FECHA_EMISION));

                // 4. Buscar la primera factura que contenga nuestros ítems en su DETALLE_JSON
                for (const factura of facturas) {
                    if (factura.DETALLE_JSON) {
                        try {
                            const detalles = JSON.parse(factura.DETALLE_JSON);
                            const tieneItem = detalles.some(d =>
                                skus.includes(String(d.codigo).trim()) ||
                                nombres.includes(String(d.nombre).trim().toUpperCase())
                            );

                            if (tieneItem) {
                                // Formatear fecha a DD/MM/YYYY si es válida
                                const fechaObj = new Date(factura.FECHA_EMISION);
                                if (!isNaN(fechaObj)) {
                                    ultimaFecha = fechaObj.toLocaleDateString('es-CL', { timeZone: 'UTC' });
                                } else {
                                    ultimaFecha = factura.FECHA_EMISION; // Fallback string
                                }
                                break; // Rompe el ciclo por eficiencia (ya estaba ordenado desc)
                            }
                        } catch (e) {
                            // Fallback estricto si el JSON falla (búsqueda de subcadena en texto plano)
                            const textoPlano = String(factura.DETALLE_JSON).toUpperCase();
                            const tieneItemFuerte = skus.some(sku => textoPlano.includes(`"CODIGO":"${sku}"`)) ||
                                nombres.some(nom => textoPlano.includes(`"NOMBRE":"${nom}"`));

                            if (tieneItemFuerte) {
                                ultimaFecha = factura.FECHA_EMISION;
                                break;
                            }
                        }
                    }
                }
            }

            return ultimaFecha;
        },

        construirTabla: function () {
            const datos = window.SISTEMA_ERP.datos.MAESTRO_ITEMS || [];
            const datosActivos = datos.filter(item => item.STATUS === this.estado.filtroActual);
            const contenedorPrincipal = document.getElementById('v-items-tabla');

            if (!contenedorPrincipal) return;

            contenedorPrincipal.innerHTML = '';

            if (this.estado.vistaActiva === 'tarjetas') {
                let datosTarjetas = datosActivos;
                if (this.estado.filtroProveedor !== 'TODOS') {
                    datosTarjetas = datosActivos.filter(item => (item.RUT_PROV_PREFERENTE || "SIN_PROVEEDOR") === this.estado.filtroProveedor);
                }
                this._construirTarjetas(datosTarjetas, contenedorPrincipal, datosActivos);
            } else {
                this._construirListaAcordeon(datosActivos, contenedorPrincipal);
            }
        },

        _construirListaAcordeon: function (datosFiltrados, contenedor) {
            if (!document.getElementById('css-acordeon-aislado')) {
                const style = document.createElement('style');
                style.id = 'css-acordeon-aislado';
                style.innerHTML = `
                    #accordion-proveedores-items .factory-container > .border-top { 
                        display: none !important; 
                    }
                `;
                document.head.appendChild(style);
            }

            const agrupadoPorRut = this._agruparPorProveedor(datosFiltrados);
            contenedor.innerHTML = '<div class="accordion" id="accordion-proveedores-items"></div>';
            const contenedorAcordeon = document.getElementById('accordion-proveedores-items');

            let indice = 0;

            for (const [rut, itemsDelProveedor] of Object.entries(agrupadoPorRut)) {
                indice++;
                const isFirst = (indice === 1);

                let razonSocial = "Proveedor No Asignado";
                if (rut !== "SIN_PROVEEDOR" && window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES) {
                    const provMatch = window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES.find(p => p.RUT_ENTIDAD === rut);
                    if (provMatch) razonSocial = provMatch.RAZON_SOCIAL;
                }

                // 🛠️ Ejecución de telemetría de compras enviando array de SKUs para validación cruzada
                const ultimaCompra = this._obtenerUltimaCompraProveedor(rut, itemsDelProveedor);
                const idCollapse = `collapse-prov-${indice}`;
                const idTabla = `tabla-dinamica-prov-${indice}`;

                // 🛠️ Modificación UI: Texto continuo con truncamiento protector
                contenedorAcordeon.innerHTML += `
                    <div class="accordion-item border-0 mb-3 shadow-sm rounded overflow-hidden">
                        <h2 class="accordion-header">
                            <button class="accordion-button ${isFirst ? '' : 'collapsed'} bg-light border-bottom" type="button" data-bs-toggle="collapse" data-bs-target="#${idCollapse}">
                                <div class="text-truncate text-dark w-100" style="font-size: 0.95rem;">
                                    <i class="bi bi-truck me-2 text-primary"></i>
                                    <span class="fw-bold text-uppercase">${razonSocial}</span>
                                    <span class="text-muted fw-normal"> - ${itemsDelProveedor.length} SKUs - Última compra: ${ultimaCompra}</span>
                                </div>
                            </button>
                        </h2>
                        <div id="${idCollapse}" class="accordion-collapse collapse ${isFirst ? 'show' : ''}" data-bs-parent="#accordion-proveedores-items">
                            <div class="accordion-body p-0">
                                <div id="${idTabla}" class="w-100"></div>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    window.Factory.crearTabla(idTabla, {
                        data: itemsDelProveedor,
                        idKey: 'SKU_INTERNO',
                        config: { pagination: true, rowsPerPage: 10, columnasCRUD: true },
                        columns: [
                            { key: 'SKU_INTERNO', label: 'SKU', sortable: true },
                            { key: 'NOMBRE_TECNICO', label: 'Descripción', sortable: true },
                            { key: 'TIPO_ITEM', label: 'Tipo' },
                            { key: 'UNIDAD_MEDIDA', label: 'U.M.' },
                            { key: 'STOCK_MINIMO', label: 'Min', type: 'number' },
                            {
                                key: 'ISO_ALERGENOS',
                                label: 'Alérgenos',
                                render: (val, row) => window.Ctrl_Items._detectarRiesgoAlergenico(row.NOMBRE_TECNICO, val)
                            },
                            { key: 'STATUS', label: 'Estado' }
                        ],
                        onEdit: (sku) => window.Ctrl_Items.abrirModalEdicion(sku)
                    });
                }, 0);
            }
        },

        _construirTarjetas: function (datosFiltrados, contenedor, datosGlobalesActivos) {
            let opcionesProveedoresValidos = [];
            if (window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES) {
                opcionesProveedoresValidos = window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES
                    .filter(p => this._esProveedorDeItems(p));
            }

            let optionsHtml = `<option value="TODOS" ${this.estado.filtroProveedor === 'TODOS' ? 'selected' : ''}>Todos los Catálogos</option>`;

            opcionesProveedoresValidos.forEach(p => {
                optionsHtml += `<option value="${p.RUT_ENTIDAD}" ${this.estado.filtroProveedor === p.RUT_ENTIDAD ? 'selected' : ''}>${p.RAZON_SOCIAL}</option>`;
            });

            let htmlContenido = `
            <div class="row mb-3 align-items-center bg-light p-2 rounded mx-0 shadow-sm border border-secondary-subtle">
                <div class="col-md-6 mb-2 mb-md-0">
                    <span class="badge bg-primary px-3 py-2"><i class="bi bi-box-seam me-1"></i> ${datosFiltrados.length} Registros Visibles</span>
                </div>
                <div class="col-md-6 d-flex justify-content-end">
                    <div class="input-group input-group-sm w-auto shadow-sm">
                        <span class="input-group-text bg-white border-secondary-subtle"><i class="bi bi-funnel text-muted"></i></span>
                        <select class="form-select border-secondary-subtle fw-bold text-dark" onchange="window.Ctrl_Items.filtrarPorProveedor(this.value)">
                            ${optionsHtml}
                        </select>
                    </div>
                </div>
            </div>`;

            if (datosFiltrados.length === 0) {
                htmlContenido += '<div class="alert alert-warning text-center border-warning"><i class="bi bi-info-circle me-2"></i>No hay ítems disponibles.</div>';
            } else {
                htmlContenido += '<div class="row g-3">';
                datosFiltrados.forEach(item => {
                    let razonSocial = "Proveedor Desconocido";
                    if (item.RUT_PROV_PREFERENTE && window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES) {
                        const provMatch = window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES.find(p => p.RUT_ENTIDAD === item.RUT_PROV_PREFERENTE);
                        if (provMatch) razonSocial = provMatch.RAZON_SOCIAL;
                    }

                    const badgeAlergenos = this._detectarRiesgoAlergenico(item.NOMBRE_TECNICO, item.ISO_ALERGENOS);

                    htmlContenido += `
                    <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                        <div class="card h-100 shadow-sm border-0 bg-white hover-elevate">
                            <div class="card-header bg-light border-bottom d-flex justify-content-between align-items-center py-2">
                                <span class="badge bg-secondary text-white font-monospace">${item.SKU_INTERNO}</span>
                                <span class="small text-muted fw-bold" style="font-size:0.7rem">${item.TIPO_ITEM || 'N/D'}</span>
                            </div>
                            <div class="card-body">
                                <h6 class="card-title fw-bold text-dark text-truncate mb-3" title="${item.NOMBRE_TECNICO}">${item.NOMBRE_TECNICO}</h6>
                                <p class="card-text small text-muted mb-3"><i class="bi bi-truck me-2 text-primary"></i>${razonSocial}</p>
                                
                                <div class="d-flex justify-content-between align-items-end mt-2 pt-2 border-top">
                                    <div>${badgeAlergenos}</div>
                                    <div class="text-end">
                                        <small class="text-muted d-block" style="font-size:0.65rem">STOCK MÍN.</small>
                                        <span class="fw-bold">${item.STOCK_MINIMO || 0} ${item.UNIDAD_MEDIDA || ''}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-top-0 pt-0 pb-3">
                                <button class="btn btn-sm btn-outline-primary w-100 rounded-pill shadow-sm" onclick="window.Ctrl_Items.abrirModalEdicion('${item.SKU_INTERNO}')">
                                    <i class="bi bi-pencil-fill me-1"></i> Ficha Técnica
                                </button>
                            </div>
                        </div>
                    </div>`;
                });
                htmlContenido += '</div>';
            }

            contenedor.innerHTML = htmlContenido;
        },

        _renderFichaNutricional: function (fichaJsonStr) {
            let esquema = {};
            let valoresActuales = {};

            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const configParam = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'SCHEMA_NUTRICIONAL_V1');
                if (configParam && configParam.PARAM_VALUE) {
                    try { esquema = JSON.parse(configParam.PARAM_VALUE); }
                    catch (e) { }
                }
            }

            if (fichaJsonStr) {
                try { valoresActuales = JSON.parse(fichaJsonStr); }
                catch (e) { }
            }

            let htmlInputs = '';
            for (const [key, prop] of Object.entries(esquema)) {
                const valor = valoresActuales[key] !== undefined ? valoresActuales[key] : '';
                htmlInputs += `
                    <div class="col-6 mb-2">
                        <label class="small text-muted fw-bold" style="font-size:0.7rem">${prop.l}</label>
                        <input type="number" step="0.01" class="form-control form-control-sm input-nutricional" data-key="${key}" value="${valor}">
                    </div>
                `;
            }

            return `
            <div class="card shadow-sm border-0 bg-light h-100">
                <div class="card-header bg-dark text-white text-uppercase small fw-bold d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-heart-pulse me-2 text-warning"></i> Ficha Nutricional (100g)</span>
                </div>
                <div class="card-body p-3">
                    <div class="row" id="contenedor-nutricional">
                        ${htmlInputs || '<div class="col-12 text-muted small">Esquema no configurado.</div>'}
                    </div>
                </div>
            </div>`;
        },

        _obtenerOpcionesConfiguracion: function () {
            let tiposItem = [{ id: '', label: 'Seleccione...' }];
            let provs = [{ id: '', label: 'Seleccione...' }];

            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const catParam = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'CATALOGO_TIPOS_ITEM');
                if (catParam && catParam.PARAM_VALUE) {
                    try {
                        const parsed = JSON.parse(catParam.PARAM_VALUE);
                        tiposItem = tiposItem.concat(Object.keys(parsed).map(k => ({ id: k, label: parsed[k] })));
                    } catch (e) { }
                }
            }

            if (window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES) {
                provs = provs.concat(window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES
                    .filter(p => this._esProveedorDeItems(p))
                    .map(p => ({ id: p.RUT_ENTIDAD, label: `${p.RUT_ENTIDAD} - ${p.RAZON_SOCIAL}` })));
            }

            return { tiposItem, provs };
        },

        abrirModalEdicion: function (sku) {
            const esNuevo = (sku === 'NUEVO');
            const datos = window.SISTEMA_ERP.datos.MAESTRO_ITEMS || [];
            const item = esNuevo ? {} : (datos.find(i => String(i.SKU_INTERNO).trim() === String(sku).trim()) || {});

            const configVars = this._obtenerOpcionesConfiguracion();

            const idContenedorBody = window.Factory.abrirModal({
                titulo: esNuevo ? 'Crear Nuevo Item' : `Ficha Técnica: ${sku}`,
                tamaño: 'modal-xl'
            });

            const contenedor = document.getElementById(idContenedorBody);

            contenedor.innerHTML = `
                <div class="row">
                    <div class="col-lg-8" id="form-item-interno"></div>
                    <div class="col-lg-4 d-none d-lg-block">${this._renderFichaNutricional(item.FICHA_TECNICA_JSON)}</div>
                </div>
            `;

            window.Factory.crearFormulario('form-item-interno', {
                data: item,
                fields: [
                    { name: 'ID_ITEM', type: 'hidden' },
                    { name: 'SKU_INTERNO', label: 'SKU INTERNO', type: 'text', col: '4', required: true, readonly: !esNuevo },
                    { name: 'NOMBRE_TECNICO', label: 'Nombre Técnico', type: 'text', col: '8', required: true },
                    { name: 'TIPO_ITEM', label: 'Clasificación', type: 'select', col: '4', required: true, options: configVars.tiposItem },
                    {
                        name: 'UNIDAD_MEDIDA', label: 'U. Medida', type: 'select', col: '4', required: true, options: [
                            { id: '', label: '...' }, { id: 'UN', label: 'Unidad' }, { id: 'KG', label: 'Kilogramos' }, { id: 'LT', label: 'Litros' }
                        ]
                    },
                    {
                        name: 'CATEGORIA_ABC', label: 'Categoría ABC', type: 'select', col: '4', options: [
                            { id: '', label: '...' }, { id: 'A', label: 'A (Crítico)' }, { id: 'B', label: 'B (Medio)' }, { id: 'C', label: 'C (Bajo)' }
                        ]
                    },
                    { name: 'RUT_PROV_PREFERENTE', label: 'Proveedor Preferente', type: 'select', col: '12', options: configVars.provs },
                    { name: 'STOCK_MINIMO', label: 'Stock Mínimo', type: 'number', col: '4' },
                    { name: 'PUNTO_REORDEN', label: 'Punto Reorden', type: 'number', col: '4' },
                    { name: 'STOCK_MAXIMO', label: 'Stock Máximo', type: 'number', col: '4' },
                    {
                        name: 'ISO_ALERGENOS', label: 'Contiene Alérgenos (ISO)', type: 'select', col: '6', required: true, options: [
                            { id: 'NO', label: 'NO CONTIENE' }, { id: 'SI', label: 'SÍ CONTIENE (RIESGO DECLARADO)' }
                        ]
                    },
                    { name: 'ISO_VIDA_UTIL_DIAS', label: 'Vida Útil (Días)', type: 'number', col: '6' }
                ],
                onSubmit: (payload) => this.guardarCambios(payload)
            });
        },

        guardarCambios: function (payload) {
            const btn = document.querySelector('#form-item-interno button[type="submit"]');
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Transfiriendo...'; }

            let datosNutricionales = {};
            document.querySelectorAll('.input-nutricional').forEach(input => {
                const key = input.getAttribute('data-key');
                if (key && input.value !== '') {
                    datosNutricionales[key] = parseFloat(input.value);
                }
            });

            payload.FICHA_TECNICA_JSON = JSON.stringify(datosNutricionales);
            const usuarioActual = window.SISTEMA_ERP.usuarioLogueado?.email || window.SISTEMA_ERP.identidad?.email || "SYSTEM";

            google.script.run
                .withSuccessHandler((resString) => {
                    const res = JSON.parse(resString);
                    if (res.success) {
                        window.Ctrl_Items.ejecutarRecargaSilenciosa(res.data);
                        window.Factory.cerrarModal();
                        console.log("✅ [Módulo Items] Mutación confirmada forensemente.");
                    } else {
                        alert("Error de integridad: " + res.message);
                        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-save me-1"></i> Guardar'; }
                    }
                })
                .withFailureHandler((err) => {
                    alert("Falla de comunicación con el núcleo V8.");
                    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-save me-1"></i> Guardar'; }
                })
                .w_items_guardarItem(payload, usuarioActual);
        },

        ejecutarRecargaSilenciosa: function (itemActualizado) {
            const arrayItems = window.SISTEMA_ERP.datos.MAESTRO_ITEMS;
            const indice = arrayItems.findIndex(i => String(i.SKU_INTERNO).trim() === String(itemActualizado.SKU_INTERNO).trim());

            if (indice >= 0) {
                arrayItems[indice] = Object.assign(arrayItems[indice], itemActualizado);
            } else {
                arrayItems.push(itemActualizado);
            }

            this.construirTabla();
        },

        vincularEventos: function () {
            const btnNuevo = document.getElementById('btn-items-nuevo');
            if (btnNuevo) btnNuevo.addEventListener('click', () => this.abrirModalEdicion('NUEVO'));
        }
    };

    window.addEventListener('erp-ram-descargada', () => {
        if (window.SISTEMA_ERP.moduloActual === 'items') {
            window.Ctrl_Items.render();
        }
    });
</script>
