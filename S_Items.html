<script>
    /**
     * @file S_Items.html
     * @version 1.4.9
     * @description Versión Operativa Completa. Restaura filtros, última compra y auditoría profunda.
     */

    window.Ctrl_Items = {

        /** [SCOPE: CONFIG] */
        meta: {
            id: 'items',
            version: '1.4.9',
            titulo: 'Maestro de Items',
            icono: 'bi-box-seam',
            tematica: 'Inventario',
            seguridad: { permisos: ['items', '*'], nivel_acceso: 1 }
        },

        estado: {
            cargado: false,
            filtroActual: 'ACTIVO',
            vistaActiva: 'lista',
            filtroProveedor: 'TODOS'
        },

        /** [SCOPE: CORE_LOGIC] */
        _detectarRiesgoAlergenico: function (nombreItem, declaracionManual) {
            const nombreLimpio = (nombreItem || "").toUpperCase();
            let detectado = null;
            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const param = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'MATRIZ_ALERGENOS');
                if (param && param.PARAM_VALUE) {
                    try {
                        const matriz = JSON.parse(param.PARAM_VALUE);
                        for (const [cat, palabras] of Object.entries(matriz)) {
                            if (palabras.some(p => nombreLimpio.includes(p))) { detectado = cat; break; }
                        }
                    } catch (e) { }
                }
            }
            if ((declaracionManual === 'NO' || !declaracionManual) && detectado) {
                return `<span class="badge bg-warning text-dark border border-danger shadow-sm"><i class="bi bi-exclamation-triangle"></i> NO DECLARADO: ${detectado}</span>`;
            }
            if (declaracionManual && declaracionManual !== 'NO') {
                const label = (declaracionManual === 'SI') ? (detectado || 'RIESGO') : declaracionManual;
                const color = (declaracionManual === detectado || declaracionManual === 'SI') ? 'bg-danger' : 'bg-secondary';
                return `<span class="badge ${color} shadow-sm"><i class="bi bi-shield-check"></i> ${label}</span>`;
            }
            return '<span class="badge bg-success opacity-75 shadow-sm">LIBRE</span>';
        },

        _obtenerOpcionesAlergenos: function () {
            let opciones = [{ id: 'NO', label: 'NO CONTIENE' }, { id: 'SI', label: 'SÍ (GENÉRICO)' }];
            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const param = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'MATRIZ_ALERGENOS');
                if (param && param.PARAM_VALUE) {
                    try {
                        const matriz = JSON.parse(param.PARAM_VALUE);
                        Object.keys(matriz).forEach(key => opciones.push({ id: key, label: `SÍ: ${key}` }));
                    } catch (e) { }
                }
            }
            return opciones;
        },

        _esProveedorDeItems: function (p) {
            if (!p || p.STATUS !== 'ACTIVO' || !p.PERFIL_JSON) return false;
            try { return JSON.parse(p.PERFIL_JSON).proveedor_items === true; } catch (e) { return false; }
        },

        _agruparPorProveedor: function (datos) {
            return datos.reduce((acc, item) => {
                const rut = item.RUT_PROV_PREFERENTE || "SIN_PROVEEDOR";
                if (!acc[rut]) acc[rut] = [];
                acc[rut].push(item);
                return acc;
            }, {});
        },

        _obtenerUltimaCompraProveedor: function (rutProveedor, itemsDelProveedor) {
            if (rutProveedor === "SIN_PROVEEDOR" || !window.SISTEMA_ERP.datos.LIBRO_COMPRAS) return "N/D";
            let ultimaFecha = "Sin registros";
            const skus = itemsDelProveedor.map(i => String(i.SKU_INTERNO).trim());
            const facturas = window.SISTEMA_ERP.datos.LIBRO_COMPRAS
                .filter(f => f.RUT_PROVEEDOR === rutProveedor || f.RUT_EMISOR === rutProveedor)
                .sort((a, b) => new Date(b.FECHA_EMISION) - new Date(a.FECHA_EMISION));

            for (const factura of facturas) {
                try {
                    const detalles = JSON.parse(factura.DETALLE_JSON || '[]');
                    if (detalles.some(d => skus.includes(String(d.codigo).trim()))) {
                        ultimaFecha = new Date(factura.FECHA_EMISION).toLocaleDateString('es-CL', { timeZone: 'UTC' });
                        break;
                    }
                } catch (e) { }
            }
            return ultimaFecha;
        },

        /** [SCOPE: UI_COMPONENTS] */
        _renderTelemetria: function (contenedor, datos) {
            let alergenos = 0, fichaBlind = 0;
            let conteoClasif = {};
            let catalogoLabels = {};

            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const conf = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'CATALOGO_TIPOS_ITEM');
                if (conf) try { catalogoLabels = JSON.parse(conf.PARAM_VALUE); } catch (e) { }
            }

            datos.forEach(item => {
                const badge = this._detectarRiesgoAlergenico(item.NOMBRE_TECNICO, item.ISO_ALERGENOS);
                if (badge.includes('bg-danger') || badge.includes('bg-warning')) alergenos++;

                let sumaNut = 0;
                try {
                    const f = JSON.parse(item.FICHA_TECNICA_JSON || '{}');
                    sumaNut = Object.values(f).reduce((a, b) => a + (parseFloat(b) || 0), 0);
                } catch (e) { sumaNut = 0; }
                if (sumaNut === 0) fichaBlind++;

                const tipo = item.TIPO_ITEM || 'S/C';
                conteoClasif[tipo] = (conteoClasif[tipo] || 0) + 1;
            });

            const listaTiposHtml = Object.entries(conteoClasif).map(([tipo, count]) => {
                const label = catalogoLabels[tipo] || tipo;
                return `<div class="d-flex justify-content-between border-bottom pb-1 mb-1" style="font-size:0.65rem;">
                            <span class="text-truncate me-2">${label}</span>
                            <span class="fw-bold text-info">${count}</span>
                        </div>`;
            }).join('');

            contenedor.innerHTML = `
            <div class="row g-3 mb-4 animate__animated animate__fadeIn">
                <div class="col-md-4">
                    <div class="card bg-white border-0 shadow-sm border-start border-4 border-info h-100">
                        <div class="card-body p-3">
                            <h6 class="text-muted text-uppercase fw-bold mb-2" style="font-size:0.7rem;">Distribución por Tipo</h6>
                            <div style="max-height: 85px; overflow-y: auto;">${listaTiposHtml || 'Sin datos'}</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-white border-0 shadow-sm border-start border-4 border-danger h-100">
                        <div class="card-body p-3 text-center">
                            <h6 class="text-muted text-uppercase fw-bold mb-1" style="font-size:0.7rem;">Riesgo Alergénico</h6>
                            <h3 class="fw-bold mb-0">${alergenos}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-white border-0 shadow-sm border-start border-4 border-warning h-100">
                        <div class="card-body p-3 text-center">
                            <h6 class="text-muted text-uppercase fw-bold mb-1" style="font-size:0.7rem;">Ficha Incompleta</h6>
                            <h3 class="fw-bold mb-0 text-warning">${fichaBlind}</h3>
                        </div>
                    </div>
                </div>
            </div>`;
        },

        _construirListaAcordeon: function (datos, contenedor) {
            const agrupado = this._agruparPorProveedor(datos);
            contenedor.innerHTML = '<div class="accordion shadow-sm" id="acc-items"></div>';
            const acc = document.getElementById('acc-items');

            Object.entries(agrupado).forEach(([rut, items], idx) => {
                const p = (window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES || []).find(x => x.RUT_ENTIDAD === rut);
                const ultCompra = this._obtenerUltimaCompraProveedor(rut, items);
                const idTab = `tab-item-${idx}`;

                acc.innerHTML += `
                <div class="accordion-item border-0 mb-2 rounded overflow-hidden">
                    <h2 class="accordion-header"><button class="accordion-button collapsed bg-light py-2" data-bs-toggle="collapse" data-bs-target="#c-${idx}">
                        <div class="small w-100 d-flex justify-content-between align-items-center pe-3">
                            <span><i class="bi bi-truck me-2 text-primary"></i><b>${p ? p.RAZON_SOCIAL : 'SIN PROVEEDOR'}</b> (${items.length} SKUs)</span>
                            <span class="text-muted" style="font-size:0.65rem;">Última Compra: ${ultCompra}</span>
                        </div>
                    </button></h2>
                    <div id="c-${idx}" class="accordion-collapse collapse" data-bs-parent="#acc-items">
                        <div class="accordion-body p-0"><div id="${idTab}"></div></div>
                    </div>
                </div>`;

                setTimeout(() => {
                    window.Factory.crearTabla(idTab, {
                        data: items, idKey: 'SKU_INTERNO', config: { pagination: true, rowsPerPage: 10, columnasCRUD: true },
                        columns: [
                            { key: 'SKU_INTERNO', label: 'SKU' },
                            { key: 'NOMBRE_TECNICO', label: 'Descripción' },
                            {
                                key: 'TIPO_ITEM', label: 'Tipo', render: (val) => {
                                    const catItem = (window.SISTEMA_ERP.datos.SYS_CONFIG || []).find(c => c.PARAM_KEY === 'CATALOGO_TIPOS_ITEM');
                                    try { return JSON.parse(catItem.PARAM_VALUE)[val] || val; } catch (e) { return val; }
                                }
                            },
                            { key: 'UNIDAD_MEDIDA', label: 'U.M.' },
                            { key: 'ISO_ALERGENOS', label: 'ISO Alérgenos', render: (v, r) => this._detectarRiesgoAlergenico(r.NOMBRE_TECNICO, v) }
                        ],
                        onEdit: sku => this.abrirModalEdicion(sku)
                    });
                }, 10);
            });
        },

        _construirTarjetas: function (datos, contenedor, provsValidos) {
            let options = `<option value="TODOS" ${this.estado.filtroProveedor === 'TODOS' ? 'selected' : ''}>Todos los Catálogos</option>`;
            provsValidos.forEach(p => options += `<option value="${p.RUT_ENTIDAD}" ${this.estado.filtroProveedor === p.RUT_ENTIDAD ? 'selected' : ''}>${p.RAZON_SOCIAL}</option>`);

            let html = `<div class="row mb-3 align-items-center bg-light p-2 rounded mx-0 border">
                <div class="col-md-6 mb-2 mb-md-0"><span class="badge bg-primary">${datos.length} SKUs Visibles</span></div>
                <div class="col-md-6 d-flex justify-content-end">
                    <select class="form-select form-select-sm w-auto fw-bold" onchange="window.Ctrl_Items.filtrarPorProveedor(this.value)">${options}</select>
                </div>
            </div><div class="row g-3">`;

            datos.forEach(item => {
                const insignia = this._detectarRiesgoAlergenico(item.NOMBRE_TECNICO, item.ISO_ALERGENOS);
                html += `
                <div class="col-12 col-md-4 col-xl-3">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="badge bg-secondary small">${item.SKU_INTERNO}</span>
                                <span class="small text-muted fw-bold">${item.TIPO_ITEM || 'N/D'}</span>
                            </div>
                            <h6 class="fw-bold text-dark text-truncate" title="${item.NOMBRE_TECNICO}">${item.NOMBRE_TECNICO}</h6>
                            <div class="mt-3 d-flex justify-content-between align-items-center">
                                <div>${insignia}</div>
                                <button class="btn btn-sm btn-primary rounded-pill" onclick="window.Ctrl_Items.abrirModalEdicion('${item.SKU_INTERNO}')">Ficha</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html + '</div>';
        },

        /** [SCOPE: DATA_ACCESS] */
        render: function () {
            if (!window.SISTEMA_ERP.datos.MAESTRO_ITEMS) return;
            this.construirTabla();
        },

        construirTabla: function () {
            const datosGlobales = window.SISTEMA_ERP.datos.MAESTRO_ITEMS || [];
            const contenedorPrincipal = document.getElementById('v-items-tabla');
            if (!contenedorPrincipal) return;

            let datosFiltrados = datosGlobales.filter(item => item.STATUS === this.estado.filtroActual);
            let provsValidos = (window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES || []).filter(p => this._esProveedorDeItems(p));
            const rutsValidos = provsValidos.map(p => p.RUT_ENTIDAD);

            datosFiltrados = datosFiltrados.filter(item => !item.RUT_PROV_PREFERENTE || item.RUT_PROV_PREFERENTE === "SIN_PROVEEDOR" || rutsValidos.includes(item.RUT_PROV_PREFERENTE));

            if (this.estado.filtroProveedor !== 'TODOS') {
                datosFiltrados = datosFiltrados.filter(item => (item.RUT_PROV_PREFERENTE || "SIN_PROVEEDOR") === this.estado.filtroProveedor);
            }

            contenedorPrincipal.innerHTML = '';
            const contenedorTelemetria = document.createElement('div');
            this._renderTelemetria(contenedorTelemetria, datosFiltrados);
            contenedorPrincipal.appendChild(contenedorTelemetria);

            const contenedorVista = document.createElement('div');
            contenedorPrincipal.appendChild(contenedorVista);

            if (this.estado.vistaActiva === 'tarjetas') this._construirTarjetas(datosFiltrados, contenedorVista, provsValidos);
            else this._construirListaAcordeon(datosFiltrados, contenedorVista);
        },

        /** [SCOPE: CLIENT_SCRIPTS] */
        init: function () {
            if (!this.estado.cargado) {
                const b = document.getElementById('btn-items-nuevo');
                if (b) b.onclick = () => this.abrirModalEdicion('NUEVO');
                this.estado.cargado = true;
            }
        },

        alternarVista: function (t) {
            this.estado.vistaActiva = t;
            this.estado.filtroProveedor = 'TODOS';
            this.render();
        },

        filtrarPorProveedor: function (r) {
            this.estado.filtroProveedor = r;
            this.render();
        },

        abrirModalEdicion: function (sku) {
            const esNuevo = (sku === 'NUEVO');
            const item = esNuevo ? {} : (window.SISTEMA_ERP.datos.MAESTRO_ITEMS.find(i => String(i.SKU_INTERNO).trim() === String(sku).trim()) || {});

            // Cargar Opciones de Configuración
            let tipos = [{ id: '', label: 'Seleccione...' }];
            let provs = [{ id: '', label: 'Seleccione...' }];
            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const cat = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'CATALOGO_TIPOS_ITEM');
                if (cat) try {
                    const p = JSON.parse(cat.PARAM_VALUE);
                    tipos = tipos.concat(Object.keys(p).map(k => ({ id: k, label: p[k] })));
                } catch (e) { }
            }
            if (window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES) {
                provs = provs.concat(window.SISTEMA_ERP.datos.MAESTRO_PROVEEDORES.filter(p => this._esProveedorDeItems(p)).map(p => ({ id: p.RUT_ENTIDAD, label: `${p.RUT_ENTIDAD} - ${p.RAZON_SOCIAL}` })));
            }

            const idContenedorBody = window.Factory.abrirModal({ titulo: esNuevo ? 'Crear Nuevo Item' : `Ficha: ${sku}`, tamaño: 'modal-xl' });

            // Render Ficha Nutricional Lateral
            let esquemaNut = {};
            if (window.SISTEMA_ERP.datos.SYS_CONFIG) {
                const conf = window.SISTEMA_ERP.datos.SYS_CONFIG.find(c => c.PARAM_KEY === 'SCHEMA_NUTRICIONAL_V1');
                if (conf) try { esquemaNut = JSON.parse(conf.PARAM_VALUE); } catch (e) { }
            }
            const valoresNut = JSON.parse(item.FICHA_TECNICA_JSON || '{}');
            let inputsNut = Object.entries(esquemaNut).map(([k, p]) => `
                <div class="col-6 mb-2">
                    <label class="small text-muted fw-bold" style="font-size:0.65rem">${p.l}</label>
                    <input type="number" step="0.01" class="form-control form-control-sm input-nutricional" data-key="${k}" value="${valoresNut[k] || ''}">
                </div>`).join('');

            document.getElementById(idContenedorBody).innerHTML = `
                <div class="row">
                    <div class="col-lg-8" id="form-item-interno"></div>
                    <div class="col-lg-4">
                        <div class="card shadow-sm border-0 bg-light"><div class="card-header bg-dark text-white small fw-bold">Ficha Nutricional (100g)</div>
                        <div class="card-body p-3"><div class="row">${inputsNut || 'Sin esquema.'}</div></div></div>
                    </div>
                </div>`;

            window.Factory.crearFormulario('form-item-interno', {
                data: item,
                fields: [
                    { name: 'ID_ITEM', type: 'hidden' },
                    { name: 'SKU_INTERNO', label: 'SKU INTERNO', type: 'text', col: '4', required: true, readonly: !esNuevo },
                    { name: 'NOMBRE_TECNICO', label: 'Nombre Técnico', type: 'text', col: '8', required: true },
                    { name: 'TIPO_ITEM', label: 'Clasificación', type: 'select', col: '4', required: true, options: tipos },
                    { name: 'CATEGORIA_ABC', label: 'Cat. ABC', type: 'select', col: '4', options: [{ id: 'A', label: 'A' }, { id: 'B', label: 'B' }, { id: 'C', label: 'C' }] },
                    { name: 'UNIDAD_MEDIDA', label: 'U. Medida', type: 'select', col: '4', options: [{ id: 'UN', label: 'Unidad' }, { id: 'KG', label: 'Kilos' }, { id: 'LT', label: 'Litros' }] },
                    { name: 'RUT_PROV_PREFERENTE', label: 'Proveedor Preferente', type: 'select', col: '12', options: provs },
                    { name: 'STOCK_MINIMO', label: 'Stock Mínimo', type: 'number', col: '4' },
                    { name: 'PUNTO_REORDEN', label: 'Punto Reorden', type: 'number', col: '4' },
                    { name: 'STOCK_MAXIMO', label: 'Stock Máximo', type: 'number', col: '4' },
                    { name: 'ISO_ALERGENOS', label: 'Alérgenos', type: 'select', col: '6', options: this._obtenerOpcionesAlergenos() },
                    { name: 'ISO_VIDA_UTIL_DIAS', label: 'Vida Útil (Días)', type: 'number', col: '6' },
                    { name: 'STATUS', label: 'Estado', type: 'select', col: '12', options: [{ id: 'ACTIVO', label: 'ACTIVO' }, { id: 'INACTIVO', label: 'INACTIVO' }] }
                ],
                onSubmit: p => this.guardarCambios(p)
            });
        },

        guardarCambios: function (payload) {
            let nut = {};
            document.querySelectorAll('.input-nutricional').forEach(i => nut[i.dataset.key] = parseFloat(i.value) || 0);
            payload.FICHA_TECNICA_JSON = nut;
            payload._esEdicion = window.SISTEMA_ERP.datos.MAESTRO_ITEMS.some(i => i.SKU_INTERNO === payload.SKU_INTERNO);

            google.script.run
                .withSuccessHandler(res => {
                    if (JSON.parse(res).success) { window.Factory.cerrarModal(); window.ERP_Utils.recargaSilenciosa(() => this.render()); }
                })
                .w_items_guardarItem(payload, window.SISTEMA_ERP.ipCliente);
        }
    };
    window.addEventListener('erp-ram-descargada', () => { if (window.SISTEMA_ERP.moduloActual === 'items') window.Ctrl_Items.render(); });
</script>
