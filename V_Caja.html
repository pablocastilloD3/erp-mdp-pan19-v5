<div id="view-caja" class="container-fluid py-4 d-none modulo-seccion spa-view">

    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-0 text-dark">
                    <i id="view-caja-icono" class="bi me-2 text-primary"></i>
                    <span id="view-caja-titulo" class="text-uppercase">Cargando...</span>
                </h2>
                <p class="text-muted small mb-0" id="view-caja-descripcion"></p>
            </div>
            <div id="view-caja-acciones-header">
                <button class="btn btn-primary fw-bold shadow-sm" onclick="window.Ctrl_Caja.abrirModal()">
                    <i class="bi bi-plus-lg me-2"></i>NUEVO EGRESO
                </button>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-dark text-white">
                <div class="card-body p-3">
                    <h6 class="small text-uppercase opacity-75 mb-1">Saldo Caja Operativa</h6>
                    <h3 id="view-caja-saldo-total" class="fw-bold mb-0 text-info">$ 0</h3>
                </div>
            </div>
        </div>
    </div>

    <hr class="border-2 opacity-25 mb-4">

    <div class="row animate__animated animate__fadeInUp">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div id="view-caja-contenedor-principal" class="table-responsive" style="min-height: 400px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade shadow-lg" id="modal-caja-operativo" tabindex="-1" aria-hidden="true"
        data-bs-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title fw-bold text-uppercase"><i class="bi bi-shield-check me-2"></i>Registrar
                        Egreso</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-caja-operativo">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Clasificación</label>
                            <select id="caja-categoria" class="form-select border-2" required>
                                <option value="GASTO_ADM">GASTO ADMINISTRATIVO</option>
                                <option value="IMPUESTOS">IMPUESTOS / SII</option>
                                <option value="REMUNERACIONES">REMUNERACIONES / SUELDOS</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Glosa Operativa</label>
                            <input type="text" id="caja-glosa" class="form-control border-2"
                                placeholder="Ej: Pago de insumos de oficina" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Monto del Egreso</label>
                            <input type="number" id="caja-monto" min="1" step="any"
                                class="form-control form-control-lg fw-bold text-danger border-2"
                                placeholder="Ej: 25000" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-secondary fw-bold" data-bs-dismiss="modal">CANCELAR</button>
                    <button type="button" class="btn btn-primary fw-bold px-4" onclick="window.Ctrl_Caja.ejecutar()"
                        id="btn-caja-submit">
                        <i class="bi bi-send-check me-2"></i>FIRMAR TRANSACCIÓN
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
