<script>
    /**
     * @file S_Caja.html
     * @description Controlador Cliente Módulo Caja v5.2.4 (Z-Index Fix + Categorías Dinámicas SYS_CONFIG).
     * @arquitectura Bóveda Singleton (ADC) / Memory-First Estricto.
     */

    window.Ctrl_Caja = {
        meta: {
            id: 'caja',
            titulo: 'Libro de Caja',
            icono: 'bi-cash-stack',
            tematica: 'Finanzas',
            iconoTematica: 'bi-bank',
            descripcion: 'Control de egresos administrativos e impuestos.'
        },

        estado: {
            listenerActivo: false,
            modalInstance: null
        },

        init: function () {
            if (!this.estado.listenerActivo) {
                window.addEventListener('erp-datos-listos', () => {
                    if (window.SISTEMA_ERP && window.SISTEMA_ERP.moduloActual === this.meta.id) {
                        this.render();
                    }
                });
                this.estado.listenerActivo = true;
            }

            const modalEl = document.getElementById('modal-caja-operativo');
            if (modalEl) {
                // 🚀 FIX Z-INDEX: Extraer el modal del contenedor SPA y anclarlo al body
                if (modalEl.parentNode !== document.body) {
                    document.body.appendChild(modalEl);
                }

                this.estado.modalInstance = new bootstrap.Modal(modalEl);
            }

            this.render();
        },

        // 🚀 NUEVO: Cargador dinámico de categorías desde SYS_CONFIG
        cargarCategorias: function () {
            const db = window.SISTEMA_ERP.datos;
            const cnf = window.CONFIG.DB;
            const sysConfig = db[cnf.CONFIG] || [];

            const filaConfig = sysConfig.find(f => f.PARAM_KEY === 'CATALOGO_CATEGORIAS_CAJA');

            let opciones = {
                "S/I": "SIN CONFIGURACIÓN EN SYS_CONFIG"
            };

            if (filaConfig && filaConfig.PARAM_VALUE) {
                try {
                    opciones = JSON.parse(filaConfig.PARAM_VALUE);
                } catch (e) {
                    console.error("🚨 [S_Caja] JSON Inválido en CATALOGO_CATEGORIAS_CAJA");
                }
            }

            const selectEl = document.getElementById('caja-categoria');
            if (selectEl) {
                selectEl.innerHTML = ''; // Limpiar opciones quemadas en HTML

                // Opción por defecto
                const optDefault = document.createElement('option');
                optDefault.value = "";
                optDefault.text = "Seleccione Clasificación...";
                optDefault.disabled = true;
                optDefault.selected = true;
                selectEl.appendChild(optDefault);

                // Popular desde la RAM (SYS_CONFIG)
                Object.keys(opciones).forEach(llave => {
                    const opt = document.createElement('option');
                    opt.value = llave;
                    opt.text = opciones[llave];
                    selectEl.appendChild(opt);
                });
            }
        },

        render: function () {
            if (!window.SISTEMA_ERP?.datos || !window.CONFIG?.DB) return;

            // 1. Inyección de Metadatos UI
            const tituloEl = document.getElementById('view-caja-titulo');
            const iconoEl = document.getElementById('view-caja-icono');
            const descEl = document.getElementById('view-caja-descripcion');
            if (tituloEl) tituloEl.innerText = this.meta.titulo;
            if (iconoEl) iconoEl.className = `bi ${this.meta.icono} me-2 text-primary`;
            if (descEl) descEl.innerText = this.meta.descripcion;

            // 🚀 2. Ejecutar Carga Dinámica de Categorías
            this.cargarCategorias();

            // 3. Extracción Directa de RAM
            const db = window.SISTEMA_ERP.datos;
            const cnf = window.CONFIG.DB;
            const dataCaja = db[cnf.CAJA] || [];

            // 4. KPI Balance (Acceso nativo a objeto JSON)
            const saldoRAM = dataCaja.reduce((acc, f) => acc + (parseFloat(f.MONTO) || 0), 0);
            const saldoEl = document.getElementById('view-caja-saldo-total');
            if (saldoEl) saldoEl.innerText = saldoRAM.toLocaleString('es-CL', { style: 'currency', currency: 'CLP' });

            // 5. MAPEO ESTRICTO LIB_FACTORY (Usando 'key' según V5.3.0)
            const rawCxP = db[cnf.CXP] || [];
            const rawProv = db[cnf.PROVEEDORES] || [];

            const configTabla = {
                data: dataCaja,
                idKey: 'ID_MOVIMIENTO',
                columns: [
                    { label: 'FECHA', key: 'FECHA_BANCO', render: v => window.ERP_Utils.formatearFecha(v) },

                    // 🚀 CRUCE RELACIONAL DINÁMICO EN RAM
                    {
                        label: 'ENTIDAD / CATEGORÍA', key: 'INSTITUCION', render: (v, fila) => {
                            if (v === 'AUT_CXP') {
                                // 1. Buscar en Cuentas por Pagar usando el FOLIO_VINCULADO
                                const cxpRow = rawCxP.find(c => c.ID_CXP === fila.FOLIO_VINCULADO);
                                if (cxpRow) {
                                    // 2. Buscar el nombre del Proveedor usando el RUT
                                    const provRow = rawProv.find(p => p.RUT_ENTIDAD === cxpRow.RUT_PROVEEDOR);
                                    if (provRow) {
                                        return `<span class="badge bg-primary-subtle text-primary border shadow-sm"><i class="bi bi-shield-lock-fill me-1"></i>PAGO: ${provRow.RAZON_SOCIAL}</span>`;
                                    }
                                }
                                return `<span class="badge bg-warning-subtle text-warning border">PAGO AUTORIZADO (CxP)</span>`;
                            }
                            // Categoría normal (Ej: Gasto Administrativo)
                            return `<span class="badge bg-secondary-subtle text-dark border">${v || 'S/I'}</span>`;
                        }
                    },

                    { label: 'GLOSA', key: 'DESCRIPCION_BANCO', render: v => v || '-' },
                    {
                        label: 'MONTO', key: 'MONTO', render: v => {
                            const m = parseFloat(v) || 0;
                            return `<span class="fw-bold ${m < 0 ? 'text-danger' : 'text-success'}">${m.toLocaleString('es-CL', { style: 'currency', currency: 'CLP' })}</span>`;
                        }
                    },
                    { label: 'OPERADOR', key: 'USUARIO_SYNC', render: v => `<small class="text-muted">${v || 'N/A'}</small>` }
                ],
                config: { pagination: true, rowsPerPage: 15, columnasCRUD: false }
            };

            // 6. Renderizado
            window.Factory.crearTabla('view-caja-contenedor-principal', configTabla);
        },

        abrirModal: function () {
            const form = document.getElementById('form-caja-operativo');
            if (form) form.reset();
            if (this.estado.modalInstance) this.estado.modalInstance.show();
        },

        ejecutar: function () {
            const categoriaSelect = document.getElementById('caja-categoria');
            if (!categoriaSelect || !categoriaSelect.value) {
                return window.ERP_Utils.mostrarToast("Falla de Validación: Debe seleccionar una categoría.", "warning");
            }

            const montoEl = document.getElementById('caja-monto');
            let mon = parseFloat(montoEl ? montoEl.value : 0);

            // 1. Validamos que haya ingresado un valor numérico distinto de 0
            if (isNaN(mon) || mon === 0) {
                return window.ERP_Utils.mostrarToast("Falla de Validación: Ingrese un monto válido para el egreso.", "warning");
            }

            // 🚀 2. MEJORA UX: Transformación matemática automática a Negativo.
            // Math.abs() asegura que si el usuario tipeó "15000" o "-15000", 
            // siempre se convertirá en el valor negativo correcto para la base de datos.
            mon = -Math.abs(mon);

            const payload = {
                CATEGORIA: categoriaSelect.value,
                GLOSA: document.getElementById('caja-glosa').value,
                MONTO: mon // <-- Aquí viaja el monto ya convertido a negativo
            };

            const btn = document.getElementById('btn-caja-submit');
            if (btn) btn.disabled = true;

            window.ERP_Utils.actualizarSplash('Seguridad V5', 'Inyectando transacción al servidor V8...', 50);

            const ipCliente = window.SISTEMA_ERP.ipCliente || '0.0.0.0';

            google.script.run
                .withSuccessHandler((res) => {
                    let respuesta = res;
                    try { if (typeof res === 'string') respuesta = JSON.parse(res); } catch (e) { }

                    if (respuesta.error || !respuesta.success) {
                        window.ERP_Utils.mostrarToast("Falla de Motor: " + (respuesta.message || "Error desconocido"), "danger");
                        window.ERP_Utils.actualizarSplash('', '', 0);
                        if (btn) btn.disabled = false;
                        return;
                    }

                    if (this.estado.modalInstance) this.estado.modalInstance.hide();
                    window.ERP_Utils.mostrarToast("Movimiento de caja auditado exitosamente.", "success");
                    window.ERP_Utils.recargaSilenciosa();
                    if (btn) btn.disabled = false;
                })
                .withFailureHandler((err) => {
                    window.ERP_Utils.mostrarToast("Desconexión crítica con el servidor GAS.", "danger");
                    window.ERP_Utils.actualizarSplash('', '', 0);
                    if (btn) btn.disabled = false;
                })
                .w_caja_guardar(JSON.stringify(payload), ipCliente);
        }
    };
</script>
