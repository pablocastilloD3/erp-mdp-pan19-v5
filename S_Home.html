<script>
    /**
    * @file S_Home.html
    * @version 5.4.0
    * @project ERP MDP PAN19
    * @description Controlador del Panel de Control refactorizado para Bóveda Singleton y Sincronización de Telemetría.
    * @compliance ISO 22000 / URS-28
    */

    var Ctrl_Home = {
        meta: {
            id: 'home',
            titulo: 'Panel de Control',
            icono: 'bi-house-door',
            tematica: 'Dashboard',
            version: '5.4.0',
            seguridad: { permisos: ['*', 'home'], nivel_acceso: 1 }
        },

        estado: {
            cargado: false,
            listenerActivo: false
        },

        init: function () {
            console.log("🟢 [ADC] Home: Iniciando controlador (Modo Bóveda Singleton).");

            if (!this.estado.listenerActivo) {
                // Suscripción al evento del motor de hidratación.
                // Registramos ambas nomenclaturas para asegurar compatibilidad con Utils.html
                window.addEventListener('erp-data-ready', () => this.render());
                window.addEventListener('erp-datos-listos', () => this.render());
                this.estado.listenerActivo = true;
            }

            // Evaluación de caché (Zero-Trust Data Presence)
            // Si la vista se carga y la RAM ya estaba hidratada, se procesa de inmediato.
            if (window.SISTEMA_ERP && window.SISTEMA_ERP.datos && Object.keys(window.SISTEMA_ERP.datos).length > 0) {
                this.render();
            }

            this.estado.cargado = true;
        },

        render: function () {
            // Cláusula de seguridad operativa: Abortar si la RAM no está lista
            if (!window.SISTEMA_ERP || !window.SISTEMA_ERP.datos || Object.keys(window.SISTEMA_ERP.datos).length === 0) {
                console.warn("⚠️ [ADC] Home: Intento de renderizado sin datos en RAM. Abortando hasta recibir señal.");
                return;
            }

            // 1. KPI: Items Activos (Lectura directa de propiedad del objeto)
            this._actualizarKpi(CONFIG.DB.ITEMS, 'STATUS', 'ACTIVO', 'kpi-items');

            // 2. KPI: Proveedores Vigentes
            this._actualizarKpi(CONFIG.DB.PROVEEDORES, 'STATUS', 'ACTIVO', 'kpi-proveedores');

            // 3. KPI: DTEs Recibidos
            // En modo Bóveda Singleton, los datos son arreglos de objetos (sin cabeceras espurias)
            const dtes = window.SISTEMA_ERP.datos[CONFIG.DB.COMPRAS];
            const countDtes = Array.isArray(dtes) ? dtes.length : 0;
            this._setInner('kpi-dtes', countDtes);

            // 4. KPI: Alertas Calidad (ISO 22000 - Trazabilidad de Lotes)
            this._calcularAlertasCalidad();

            console.log("✅ [ADC] Home: KPIs actualizados exitosamente (Telemetría Sincronizada).");
        },

        _actualizarKpi: function (dbKey, propiedad, valorEsperado, elementId) {
            const data = window.SISTEMA_ERP.datos[dbKey];
            if (!data || !Array.isArray(data)) {
                return this._setInner(elementId, '0');
            }

            // Procesamiento de filtrado estricto sobre colección de objetos
            const count = data.filter(row => row[propiedad] && String(row[propiedad]).toUpperCase() === valorEsperado).length;
            this._setInner(elementId, count);
        },

        _calcularAlertasCalidad: function () {
            const lotes = window.SISTEMA_ERP.datos[CONFIG.DB.LOTES];
            if (!lotes || !Array.isArray(lotes)) {
                return this._setInner('kpi-alertas', '0');
            }

            // Escaneo de trazabilidad identificando no conformidades según estándar ISO 22000
            const alertas = lotes.filter(row => {
                if (!row.ESTADO_CALIDAD) return false;
                const estado = String(row.ESTADO_CALIDAD).toUpperCase();
                return estado !== 'APROBADO' && estado !== 'CONFORME' && estado !== 'NULL' && estado !== '';
            }).length;

            const el = document.getElementById('kpi-alertas');
            if (el) {
                el.innerText = alertas;
                // Aplicación de regla visual crítica si se detectan anomalías de inocuidad/calidad
                if (alertas > 0) {
                    el.classList.add('text-danger');
                } else {
                    el.classList.remove('text-danger');
                }
            }
        },

        _setInner: function (id, val) {
            const el = document.getElementById(id);
            if (el) el.innerText = val;
        }
    };
</script>
