<div id="view-updatexml" class="spa-view d-none">

    <div class="row mb-4 pt-3 animate__animated animate__fadeIn">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-0 text-dark">
                    <i id="v-updatexml-icono" class="bi bi-file-earmark-zip me-2 text-primary"></i>
                    <span id="v-updatexml-titulo" class="text-uppercase">Ingesta de Lotes (DTE)</span>
                </h2>
                <p class="text-muted small mb-0" id="v-updatexml-descripcion">
                    Carga Masiva Excluyente, Auto-PDF SII y Recarga Silenciosa.
                </p>
            </div>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <div class="d-flex justify-content-between small fw-bold text-muted mb-1">
                <span id="dte-progress-text">Esperando archivos...</span>
            </div>
            <div class="progress" style="height: 10px;">
                <div id="dte-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                    role="progressbar" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <div class="row animate__animated animate__fadeInUp mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-dark text-white fw-bold small">
                    <i class="bi bi-files me-2"></i> Selección de Lote
                </div>
                <div class="card-body bg-light text-center">
                    <div class="mb-4 mt-2">
                        <i class="bi bi-cloud-arrow-up display-4 text-primary"></i>
                        <p class="small text-muted mt-2 mb-3">Seleccione un bloque de archivos XML (DTE) o PDF. El
                            sistema validará la codificación ISO automáticamente.</p>
                        <input class="form-control border-primary" type="file" id="file-dte-lote" multiple
                            accept=".xml,.pdf">
                    </div>
                    <button class="btn btn-primary w-100 fw-bold shadow-sm"
                        onclick="window.Ctrl_UpdateXML.procesarArchivosLote()">
                        <i class="bi bi-cpu me-2"></i> Analizar Lote
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0 h-100">
                <div
                    class="card-header bg-secondary text-white fw-bold small d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-clipboard-data me-2"></i> Inspección Agrupada por RUT</span>

                    <div id="panel-controles-lote" class="d-none d-flex gap-2">
                        <button class="btn btn-sm btn-danger fw-bold shadow-sm"
                            onclick="window.Ctrl_UpdateXML.cancelarProceso()">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </button>
                        <button class="btn btn-sm btn-success fw-bold shadow-sm pulse"
                            onclick="window.Ctrl_UpdateXML.confirmarLote()">
                            <i class="bi bi-play-fill me-1"></i> Procesar Lote
                        </button>
                    </div>

                </div>
                <div class="card-body p-3 bg-light" id="v-updatexml-resultado-prevuelo"
                    style="max-height: 500px; overflow-y: auto;">
                </div>
            </div>
        </div>
    </div>

    <div id="v-updatexml-modales"></div>
</div>
