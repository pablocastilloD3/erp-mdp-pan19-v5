<script>
    /**
     * @file Lib_Factory.html
     * @version 5.3.0 - Arquitectura Visual Segregada e Índice Dinámico Paginado
     */

    window.Factory = {
        instances: {},
        modalInstance: null,

        // ==========================================
        // 1. GENERADOR DE TABLAS (ACTUALIZADO UI & ÍNDICE)
        // ==========================================
        crearTabla: function (id, config) {
            this.instances[id] = {
                data: config.data || [],
                columns: config.columns || [],
                idKey: config.idKey || 'ID_UUID',
                onEdit: config.onEdit || null,
                config: {
                    columnasCRUD: config.config?.columnasCRUD !== false,
                    pagination: config.config?.pagination || false,
                    rowSelector: config.config?.rowSelector || false,
                    rowsPerPage: parseInt(config.config?.rowsPerPage) || 10
                },
                state: {
                    currentPage: 1,
                    rowsPerPage: parseInt(config.config?.rowsPerPage) || 10
                }
            };
            this._renderTabla(id);
        },

        _renderLimitSelector: function (id, currentLimit) {
            return `
            <div class="d-flex align-items-center gap-2">
                <span class="small text-muted fw-normal mb-0">Mostrar:</span>
                <select class="form-select form-select-sm w-auto cursor-pointer py-1 shadow-none border-secondary-subtle" onchange="window.Factory._changeLimit('${id}', this.value)">
                    <option value="10" ${currentLimit == 10 ? 'selected' : ''}>10</option>
                    <option value="25" ${currentLimit == 25 ? 'selected' : ''}>25</option>
                    <option value="50" ${currentLimit == 50 ? 'selected' : ''}>50</option>
                </select>
                <span class="small text-muted fw-normal mb-0">filas</span>
            </div>`;
        },

        _renderControlesNavegacion: function (id, inst, totalRows, totalPages) {
            if (!inst.config.pagination) return '';

            return `
            <div class="d-flex justify-content-end align-items-center p-2 bg-white flex-wrap gap-3">
                ${this._renderLimitSelector(id, inst.state.rowsPerPage)}
                <span class="small text-muted mb-0 d-none d-sm-inline">Total: <b>${totalRows}</b></span>
                <nav>
                    <ul class="pagination pagination-sm mb-0 shadow-sm">
                        <li class="page-item ${inst.state.currentPage === 1 ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="event.preventDefault(); window.Factory._changePage('${id}', ${inst.state.currentPage - 1})">«</a>
                        </li>
                        <li class="page-item active">
                            <a class="page-link text-center px-3" href="#" style="pointer-events:none;">Pág. ${inst.state.currentPage} / ${totalPages}</a>
                        </li>
                        <li class="page-item ${inst.state.currentPage === totalPages ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="event.preventDefault(); window.Factory._changePage('${id}', ${inst.state.currentPage + 1})">»</a>
                        </li>
                    </ul>
                </nav>
            </div>`;
        },

        _renderTabla: function (id) {
            const inst = this.instances[id];
            const container = document.getElementById(id);
            if (!container) return;

            // Lógica de Paginación y Offset
            const totalRows = inst.data.length;
            const limit = inst.state.rowsPerPage;
            const totalPages = Math.ceil(totalRows / limit) || 1;
            const start = (inst.state.currentPage - 1) * limit;
            const pagedRows = inst.data.slice(start, start + limit);

            // Colspan dinámico sumando +1 por la nueva columna "N°"
            const spanCols = (inst.config.columnasCRUD ? inst.columns.length + 1 : inst.columns.length) + 1;

            const htmlControles = this._renderControlesNavegacion(id, inst, totalRows, totalPages);

            let html = `
            <div class="factory-container border bg-white rounded shadow-sm overflow-hidden">
                ${inst.config.pagination ? `<div class="border-bottom">${htmlControles}</div>` : ''}
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark small text-uppercase">
                            <tr>
                                <th class=\"px-3 py-2 fw-semibold\" style=\"width: 60px;\">N°</th>
                                ${inst.columns.map(c => `<th class="px-3 py-2 fw-semibold">${c.label}</th>`).join('')}
                                ${inst.config.columnasCRUD ? '<th class="text-end px-4 py-2 fw-semibold">Acciones</th>' : ''}
                            </tr>
                        </thead>
                        <tbody class="small">
                            ${this._renderRows(id, inst, pagedRows, spanCols, start)}
                        </tbody>
                    </table>
                </div>

                ${inst.config.pagination ? `<div class="border-top">${htmlControles}</div>` : ''}
            </div>`;

            container.innerHTML = html;
        },

        _renderRows: function (id, inst, rows, spanCols, start) {
            if (!rows || rows.length === 0) {
                return `<tr><td colspan="${spanCols}" class="text-center py-4 text-muted fw-bold">No hay registros disponibles.</td></tr>`;
            }

            // Inyección del índice dinámico: (offset inicial) + (índice del bucle) + 1
            return rows.map((r, index) => `
            <tr>
                <td class="px-3 text-muted fw-bold bg-light border-end" style="width: 60px;">${start + index + 1}</td>
                ${inst.columns.map(c => `<td class="px-3">${c.render ? c.render(r[c.key], r) : (r[c.key] || '-')}</td>`).join('')}
                ${inst.config.columnasCRUD ? `
                    <td class="text-end px-4">
                        <button class="btn btn-sm btn-light border rounded-pill shadow-sm"
                            onclick="window.Factory._bridge('${id}', '${r[inst.idKey]}')">
                            <i class="bi bi-pencil-fill text-primary"></i> Editar
                        </button>
                    </td>` : ''}
            </tr>`).join('');
        },

        // ==========================================
        // 2. GENERADOR DE FORMULARIOS Y MODALES
        // ==========================================
        abrirModal: function (config) {
            const { titulo = 'Sistema', tamaño = 'modal-lg' } = config;
            let modalEl = document.getElementById('factory-modal');

            if (!modalEl) {
                modalEl = document.createElement('div');
                modalEl.id = 'factory-modal';
                modalEl.className = 'modal fade';
                modalEl.setAttribute('data-bs-focus', 'false');
                document.body.appendChild(modalEl);
            }

            modalEl.innerHTML = `
            <div class="modal-dialog modal-dialog-centered ${tamaño}">
                <div class="modal-content shadow-lg border-0">
                    <div class="modal-header bg-light py-2 px-3 border-bottom">
                        <h6 class="modal-title fw-bold text-uppercase small text-primary">${titulo}</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div id="factory-modal-body" class="modal-body p-4 overflow-auto" style="max-height: 85vh;"></div>
                </div>
            </div>`;

            this.modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl, {
                backdrop: 'static',
                keyboard: false,
                focus: false
            });

            this.modalInstance.show();
            return 'factory-modal-body';
        },

        cerrarModal: function () {
            if (this.modalInstance) this.modalInstance.hide();
        },

        crearFormulario: function (id, config) {
            const container = document.getElementById(id);
            if (!container) return;
            const { fields, onSubmit, data = {} } = config;

            container.innerHTML = `
            <div class="p-4 bg-body-tertiary">
                <form id="f-${id}" onsubmit="event.preventDefault(); window.Factory._submitForm('${id}')">
                    <div class="row g-3">
                        ${fields.map(f => this._renderField(f, data)).join('')}
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                        <button type="button" class="btn btn-secondary rounded-pill px-4" onclick="window.Factory.cerrarModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm" id="btn-submit-${id}">
                            <i class="bi bi-save me-1"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>`;
            this.instances[id] = { ...this.instances[id], onSubmit: onSubmit };
        },

        _renderField: function (f, data) {
            const val = data[f.name] !== undefined ? data[f.name] : (f.default || '');
            const col = f.col || '12';
            let input = '';

            if (f.type === 'hidden') {
                return `<input type="hidden" name="${f.name}" value="${val}">`;
            }

            if (f.type === 'select') {
                input = `<select class="form-select fw-bold" name="${f.name}" ${f.required ? 'required' : ''} ${f.readonly ? 'disabled' : ''}>
                ${(f.options || []).map(o => `<option value="${o.id}" ${String(o.id) === String(val) ? 'selected' : ''}>${o.label}</option>`).join('')}
            </select>`;
                if (f.readonly) input += `<input type="hidden" name="${f.name}" value="${val}">`;
            }
            else if (f.type === 'switch-group') {
                input = `<div class="row g-2 p-3 bg-white rounded border factory-scroll-area shadow-sm">
                ${(f.options || []).map(o => `
                    <div class="col-md-6">
                        <div class="form-check form-switch p-2 border rounded ${o.checked ? 'bg-primary-subtle border-primary' : 'bg-light'}">
                            <input class="form-check-input ms-1 me-2" type="checkbox" name="${f.name}[]" value="${o.id}" id="chk-${o.id}" ${o.checked ? 'checked' : ''} ${o.disabled ? 'disabled' : ''}>
                            <label class="form-check-label fw-bold small text-dark" for="chk-${o.id}" style="cursor:pointer">
                                ${o.label} <br><span class="text-muted fw-normal" style="font-size:0.7rem">Módulo: ${o.id}</span>
                            </label>
                        </div>
                    </div>
                `).join('')}
            </div>`;
            }
            else if (f.type === 'checkbox') {
                input = `<div class="form-check form-switch p-2 rounded bg-warning-subtle border border-warning">
                <input class="form-check-input ms-1 me-2" type="checkbox" name="${f.name}" id="${f.name}" value="${f.value}" ${val ? 'checked' : ''} onchange="${f.onChange || ''}">
                <label class="form-check-label fw-bold text-dark" for="${f.name}">${f.labelCheckbox}</label>
            </div>`;
            }
            else {
                input = `<input type="${f.type || 'text'}" class="form-control" name="${f.name}" value="${val}" ${f.required ? 'required' : ''} ${f.readonly ? 'readonly' : ''}>`;
            }

            return `<div class="col-md-${col}"><label class="small fw-bold text-muted text-uppercase mb-1" style="font-size:0.7rem">${f.label}</label>${input}</div>`;
        },

        // ==========================================
        // 3. UTILIDADES INTERNAS
        // ==========================================
        _submitForm: function (id) {
            const form = document.getElementById(`f-${id}`);
            const formData = new FormData(form);
            const payload = {};

            for (let [key, value] of formData.entries()) {
                if (key.endsWith('[]')) {
                    const cleanKey = key.slice(0, -2);
                    if (!payload[cleanKey]) payload[cleanKey] = [];
                    payload[cleanKey].push(value);
                } else {
                    payload[key] = value;
                }
            }

            const btn = document.getElementById(`btn-submit-${id}`);
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Procesando...'; }

            if (this.instances[id]?.onSubmit) this.instances[id].onSubmit(payload);
        },

        _bridge: function (id, val) {
            if (this.instances[id].onEdit) this.instances[id].onEdit(val);
        },

        _changePage: function (id, newPage) {
            if (this.instances[id]) {
                this.instances[id].state.currentPage = newPage;
                this._renderTabla(id);
            }
        },

        _changeLimit: function (id, newLimit) {
            if (this.instances[id]) {
                this.instances[id].state.rowsPerPage = parseInt(newLimit);
                this.instances[id].state.currentPage = 1;
                this._renderTabla(id);
            }
        }
    };
    console.log("✅ [MOTOR] Lib_Factory v5.3.0 Activo (Índice Dinámico).");
</script>
