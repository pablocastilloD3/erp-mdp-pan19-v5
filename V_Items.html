<div id="view-items" class="spa-view d-none animate__animated animate__fadeIn">
    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h2 class="fw-bold mb-0 text-dark">
                    <i id="v-items-icono" class="bi bi-box-seam me-2 text-primary"></i>
                    <span id="v-items-titulo" class="text-uppercase">Maestro de Items</span>
                </h2>
                <p class="text-muted small mb-0" id="v-items-descripcion">
                    Control de SKUs e inocuidad alimentaria ISO 22000.
                </p>
            </div>

            <div id="v-items-acciones-header" class="d-flex align-items-center gap-2">
                <div class="btn-group shadow-sm bg-white" role="group">
                    <input type="radio" class="btn-check" name="btn-vista-items" id="btn-vista-lista" checked
                        onchange="window.Ctrl_Items.alternarVista('lista')">
                    <label class="btn btn-outline-primary btn-sm px-3" for="btn-vista-lista"><i
                            class="bi bi-list-ul"></i></label>

                    <input type="radio" class="btn-check" name="btn-vista-items" id="btn-vista-tarjetas"
                        onchange="window.Ctrl_Items.alternarVista('tarjetas')">
                    <label class="btn btn-outline-primary btn-sm px-3" for="btn-vista-tarjetas"><i
                            class="bi bi-grid"></i></label>
                </div>
                <button id="btn-items-nuevo" class="btn btn-primary btn-sm shadow-sm">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo Item
                </button>
            </div>
        </div>
    </div>

    <hr class="border-2 opacity-25 mb-4">

    <div class="row">
        <div class="col-12">
            <div id="v-items-tabla" class="w-100" style="min-height: 400px;"></div>
        </div>
    </div>
</div>
