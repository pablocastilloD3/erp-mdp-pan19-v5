<script>
    window.Ctrl_CxP = {
        meta: { id: 'cxp', titulo: 'Autorización de Pasivos', icono: 'bi-shield-check-fill', tematica: 'Finanzas', permisos: ['cxp', '*'] },
        estado: { filtroBusqueda: '', filtroEstado: 'PENDIENTE' },

        init: function () {
            window.addEventListener('erp-datos-listos', () => {
                if (window.SISTEMA_ERP.moduloActual === this.meta.id) this.render();
            });
        },

        render: function () {
            const db = window.SISTEMA_ERP.datos;
            const cnf = window.CONFIG.DB;

            const rawCxP = db[cnf.CXP] || [];
            const rawProvs = db[cnf.PROVEEDORES] || [];
            const rawCompras = db[cnf.COMPRAS] || [];

            const data = rawCxP.map(item => {
                const prov = rawProvs.find(p => p.RUT_ENTIDAD === item.RUT_PROVEEDOR) || {};
                const dte = rawCompras.find(c => c.ID_UUID === item.ID_FACTURA) || {};
                return {
                    ...item,
                    RAZON_SOCIAL: prov.RAZON_SOCIAL || 'N/A',
                    ISO_STATUS: prov.ISO_RIESGO || 'EVALUACION',
                    FOLIO_SII: dte.FOLIO || 'S/F',
                    CONTROL_CALIDAD: dte.CONTROL_CALIDAD || ''
                };
            }).filter(d => d.ESTADO_PAGO === this.estado.filtroEstado);

            window.Factory.crearTabla('v-cxp-contenedor-principal', {
                data: data,
                idKey: 'ID_CXP',
                columns: [
                    { label: 'Folio', key: 'FOLIO_SII' },
                    { label: 'Proveedor', key: 'RAZON_SOCIAL' },
                    { label: 'Deuda', key: 'MONTO_DEUDA', render: v => window.ERP_Utils.formatearMoneda(v) },
                    {
                        label: 'Calidad', key: 'CONTROL_CALIDAD', render: v => {
                            if (v === 'PENDIENTE') return '<span class="badge bg-warning">PENDIENTE</span>';
                            if (v === 'RECHAZADO') return '<span class="badge bg-danger">RECHAZADO</span>';
                            return '<span class="badge bg-success">BYPASS/OK</span>';
                        }
                    },
                    {
                        label: 'Acción', key: 'ID_CXP', render: (v, r) => {
                            const bloqueado = r.CONTROL_CALIDAD === 'PENDIENTE' || r.CONTROL_CALIDAD === 'RECHAZADO';
                            return `<button class="btn btn-sm ${bloqueado ? 'btn-secondary' : 'btn-primary'}" 
                                ${bloqueado ? 'disabled' : ''} 
                                onclick="window.Ctrl_CxP.ejecutarAutorizacion('${v}')">AUTORIZAR</button>`;
                        }
                    }
                ]
            });
        },

        ejecutarAutorizacion: function (id) {
            const reg = window.SISTEMA_ERP.datos[window.CONFIG.DB.CXP].find(d => d.ID_CXP === id);
            if (!confirm("¿Autorizar pago?")) return;
            google.script.run.withSuccessHandler(res => {
                const r = JSON.parse(res);
                if (r.success) { alert("OK"); window.ERP_Utils.recargaSilenciosa(); }
                else alert(r.message);
            }).w_cxp_autorizarPagoFinal(reg, window.SISTEMA_ERP.ipCliente);
        }
    };
    window.SISTEMA_ERP.modulos[window.Ctrl_CxP.meta.id] = window.Ctrl_CxP;
</script>
