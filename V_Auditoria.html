<div id="view-auditoria" class="spa-view d-none">

    <div class="row mb-4 pt-3 animate__animated animate__fadeIn">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-0 text-dark">
                    <i id="v-auditoria-icono" class="bi bi-shield-lock-fill me-2 text-primary"></i>
                    <span id="v-auditoria-titulo" class="text-uppercase">Auditoría Forense</span>
                </h2>
                <p class="text-muted small mb-0" id="v-auditoria-descripcion">
                    Protección de Datos e Integridad Criptográfica.
                </p>
            </div>
            <div id="v-auditoria-acciones-header" class="d-flex gap-2">
                <button class="btn btn-success btn-sm rounded-pill px-4 fw-bold shadow-sm"
                    onclick="window.Ctrl_Auditoria.verificarIntegridad()">
                    <i class="bi bi-shield-check me-1"></i> Verificar Cadena
                </button>
                <button class="btn btn-light btn-sm border rounded-pill px-3 shadow-sm"
                    onclick="window.ERP_Utils.recargaSilenciosa()">
                    <i class="bi bi-arrow-repeat me-1"></i> Sincronizar
                </button>
            </div>
        </div>
    </div>

    <hr class="border-2 opacity-25 mb-4">

    <div class="row mb-4 animate__animated animate__fadeIn">
        <div class="col-12">
            <div class="card shadow-sm border-0 bg-light">
                <div class="card-body py-2 px-3">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-2">
                            <select id="filter-audit-user" class="form-select form-select-sm"
                                onchange="window.Ctrl_Auditoria.setFiltro('filtroUser', this.value)">
                                <option value="">Usuarios</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select id="filter-audit-action" class="form-select form-select-sm"
                                onchange="window.Ctrl_Auditoria.setFiltro('filtroAccion', this.value)">
                                <option value="">Actividades</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select form-select-sm"
                                onchange="window.Ctrl_Auditoria.setFiltro('filtroMes', this.value)">
                                <option value="">Mes (Todos)</option>
                                <option value="1">Enero</option>
                                <option value="2">Febrero</option>
                                <option value="3">Marzo</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check form-switch bg-danger bg-opacity-10 border border-danger border-opacity-25 rounded px-5 py-1"
                                style="min-height: 31px;">
                                <input class="form-check-input" type="checkbox" id="filter-only-rupturas"
                                    onchange="window.Ctrl_Auditoria.setFiltro('soloRupturas', this.checked)">
                                <label class="form-check-label small fw-bold text-danger"
                                    for="filter-only-rupturas">AISLAR HASH CORRUPTO</label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="d-flex align-items-center gap-2 border rounded px-2 bg-white">
                                <span class="extra-small text-muted fw-bold">DÍAS: <b id="lbl-dias">30</b></span>
                                <input type="range" class="form-range" min="1" max="180" value="30"
                                    oninput="document.getElementById('lbl-dias').innerText = this.value"
                                    onchange="window.Ctrl_Auditoria.setFiltro('filtroDias', this.value)">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="audit-integrity-alert"></div>

    <div class="row animate__animated animate__fadeInUp">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div id="v-auditoria-contenedor-principal" class="table-responsive" style="min-height: 400px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="v-auditoria-modales"></div>
</div>
