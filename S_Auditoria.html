<script>
    /** * [SCOPE: CORE_LOGIC]
     * @file S_Auditoria.html - v5.2.0 "Eficiencia y Control"
     * @author Murphy - Arquitecto PMDC
     * @description Controlador Forense con Motor de Detección de Ruptura SHA-256.
     */

    window.Ctrl_Auditoria = {
        meta: {
            id: 'auditoria',
            version: '5.2.0',
            titulo: 'Auditoría Forense',
            icono: 'bi-shield-lock-fill',
            tematica: 'Administración',
            seguridad: { permisos: ['*'], nivel_acceso: 1 }
        },

        estado: {
            filtroUser: '',
            filtroAccion: '',
            filtroTiempo: '30',
            soloRupturas: false,
            idRuptura: null,
            listenerActivo: false
        },

        init: function () {
            console.log("🛡️ [ADC] Auditoria: Inicializando controlador forense.");

            // Suscripción al bus de datos Memory-First
            if (!this.estado.listenerActivo) {
                window.addEventListener('erp-datos-listos', () => {
                    if (window.SISTEMA_ERP.moduloActual === this.meta.id) {
                        this.render();
                    }
                });
                this.estado.listenerActivo = true;
            }
        },

        render: function () {
            const rawData = window.SISTEMA_ERP.datos[window.CONFIG.DB.AUDIT_LOG] || [];

            // Corrección Crítica: Si los datos no están mapeados como objetos, forzamos mapeo
            const logs = Array.isArray(rawData[0])
                ? window.ERP_Utils.mapearMatrizAObjetos(rawData)
                : rawData;

            this.poblarFiltros(logs);
            const dataFiltrada = this.aplicarFiltros(logs);

            window.Factory.crearTabla('v-auditoria-contenedor-principal', {
                data: dataFiltrada,
                idKey: 'ID_LOG',
                columns: [
                    { key: 'TIMESTAMP', label: 'Fecha/Hora', render: v => `<span class="extra-small text-muted">${v.replace('T', ' ').split('.')[0]}</span>` },
                    { key: 'USER_EMAIL', label: 'Usuario', render: v => `<span class="fw-bold">${v.split('@')[0]}</span>` },
                    { key: 'ACTION_TYPE', label: 'Evento', render: (v, r) => this._renderBadgeEvento(v, r) },
                    { key: 'MODULO', label: 'Módulo' },
                    { key: 'DETALLES', label: 'Detalle Transaccional', render: v => `<span class="text-truncate d-inline-block" style="max-width:250px">${v}</span>` }
                ],
                config: {
                    columnasCRUD: true,
                    pagination: true,
                    rowsPerPage: 15
                },
                onEdit: (id) => this.abrirDetalle(id, logs)
            });

            // Sobrescribir botón Editar por "Ver Forense"
            const btnEditar = document.querySelectorAll('#v-auditoria-contenedor-principal .btn-light');
            btnEditar.forEach(btn => {
                btn.innerHTML = '<i class="bi bi-eye-fill text-primary"></i> Forense';
            });
        },

        setFiltro: function (key, value) {
            this.estado[key] = value;
            this.render();
        },

        aplicarFiltros: function (data) {
            const ahora = new Date();
            return data.filter(l => {
                // Filtro Usuario
                if (this.estado.filtroUser && l.USER_EMAIL !== this.estado.filtroUser) return false;

                // Filtro Acción
                if (this.estado.filtroAccion && l.ACTION_TYPE !== this.estado.filtroAccion) return false;

                // Filtro Rupturas
                if (this.estado.soloRupturas && l.ID_LOG !== this.estado.idRuptura) return false;

                // Filtro Tiempo
                if (this.estado.filtroTiempo !== 'all') {
                    const fLog = new Date(l.TIMESTAMP);
                    const diffDias = (ahora - fLog) / (1000 * 60 * 60 * 24);
                    if (this.estado.filtroTiempo === 'today' && diffDias > 1) return false;
                    if (!isNaN(this.estado.filtroTiempo) && diffDias > parseInt(this.estado.filtroTiempo)) return false;
                }
                return true;
            }).sort((a, b) => new Date(b.TIMESTAMP) - new Date(a.TIMESTAMP));
        },

        verificarIntegridad: function () {
            window.ERP_Utils.mostrarLoading(true);
            google.script.run
                .withSuccessHandler(resStr => {
                    window.ERP_Utils.mostrarLoading(false);
                    const res = JSON.parse(resStr);
                    const alertaCont = document.getElementById('audit-integrity-alert');

                    if (res.integro) {
                        alertaCont.innerHTML = `<div class="alert alert-success d-flex align-items-center border-0 shadow-sm animate__animated animate__bounceIn">
                            <i class="bi bi-shield-check-fill fs-4 me-3"></i>
                            <div><strong>CADENA ÍNTEGRA:</strong> Se validaron ${res.analizados} bloques SHA-256 exitosamente.</div>
                        </div>`;
                        this.estado.idRuptura = null;
                    } else {
                        this.estado.idRuptura = res.idRuptura;
                        alertaCont.innerHTML = `<div class="alert alert-danger d-flex align-items-center border-0 shadow-sm animate__animated animate__shakeX">
                            <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
                            <div>
                                <strong>RUPTURA DE INTEGRIDAD DETECTADA:</strong> Inconsistencia en bloque <code>${res.idRuptura}</code> (Fila ${res.fila}).
                                <br><small>Firma digital no coincide con el registro previo. Posible manipulación externa.</small>
                            </div>
                        </div>`;
                        this.render();
                    }
                })
                .w_verificarIntegridadLogs();
        },

        /**
         * [SCOPE: UI_INTERACTION]
         * Abre el detalle forense de un registro específico.
         */
        abrirDetalle: function (id, logs) {
            const l = logs.find(x => x.ID_LOG === id);
            if (!l) return;

            const html = `
                <div class="p-4 bg-light shadow-inner animate__animated animate__fadeIn">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <h6 class="fw-bold text-primary border-bottom pb-2">
                                <i class="bi bi-person-badge me-2"></i>METADATOS DE IDENTIDAD
                            </h6>
                            <table class="table table-sm extra-small mb-0">
                                <tr><td class="text-muted" style="width:35%">ID Log:</td><td class="font-monospace">${l.ID_LOG}</td></tr>
                                <tr><td class="text-muted">Operador:</td><td class="fw-bold">${l.USER_EMAIL}</td></tr>
                                <tr><td class="text-muted">IP Origen:</td><td>${l.IP_ADDRESS}</td></tr>
                                <tr><td class="text-muted">Firma (Hash):</td><td class="font-monospace text-truncate text-primary" style="max-width:150px">${l.HASH_RECORD}</td></tr>
                            </table>
                        </div>
                        
                        <div class="col-md-6">
                            <h6 class="fw-bold text-success border-bottom pb-2">
                                <i class="bi bi-activity me-2"></i>CONTEXTO DE ACCIÓN
                            </h6>
                            <table class="table table-sm extra-small mb-0">
                                <tr><td class="text-muted" style="width:35%">Tipo Evento:</td><td><span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25">${l.ACTION_TYPE}</span></td></tr>
                                <tr><td class="text-muted">Módulo:</td><td class="text-uppercase">${l.MODULO}</td></tr>
                                ${l.ENTIDAD_ID && l.ENTIDAD_ID !== 'N/A'
                    ? `<tr><td class="text-muted">ID Entidad:</td><td class="font-monospace text-dark fw-bold">${l.ENTIDAD_ID}</td></tr>`
                    : `<tr><td class="text-muted text-opacity-50 italic">Referencia:</td><td class="text-muted small">Sin entidad vinculada</td></tr>`
                }
                            </table>
                        </div>
                    </div>

                    <div class="mt-4">
                        <h6 class="fw-bold text-secondary border-bottom pb-2">
                            <i class="bi bi-arrow-left-right me-2"></i>ANÁLISIS DIFERENCIAL (MUTACIÓN)
                        </h6>
                        <div class="bg-white border rounded p-0 shadow-sm" style="max-height:350px; overflow-y:auto;">
                            ${this.generarDiffTable(l.VALOR_ANTERIOR, l.VALOR_NUEVO)}
                        </div>
                    </div>
                </div>
            `;

            window.ERP_Utils.abrirModalDinamico("INSPECCIÓN FORENSE", html, 'modal-lg');
        },

        /**
         * [SCOPE: DATA_ANALYSIS]
         * Procesa y compara estructuras JSON para detectar cambios campo por campo.
         */
        generarDiffTable: function (ant, nvo) {
            // Caso 1: Eventos informativos sin cambio de datos
            if ((!ant || ant === 'N/A') && (!nvo || nvo === 'N/A')) {
                return `<div class="text-center py-4 text-muted bg-light italic small">
                            <i class="bi bi-info-circle me-2"></i>Este evento no registra mutación de datos (Metadatos de sesión o acceso).
                        </div>`;
            }

            try {
                const parseJSON = (str) => {
                    if (!str || str === 'N/A' || str === '{}') return {};
                    try {
                        return typeof str === 'object' ? str : JSON.parse(str);
                    } catch (e) { return null; }
                };

                const oA = parseJSON(ant);
                const oN = parseJSON(nvo);

                // Si el parseo falla (no es JSON), mostrar en bruto
                if (oA === null || oN === null) {
                    return `<div class="p-3 extra-small">
                                <div class="fw-bold text-muted mb-1 text-uppercase small">Datos Crudos:</div>
                                <pre class="p-2 bg-light border rounded mb-0">${nvo}</pre>
                            </div>`;
                }

                const keys = [...new Set([...Object.keys(oA), ...Object.keys(oN)])];
                if (keys.length === 0) return `<div class="p-3 text-center text-muted small italic">Estructura JSON vacía.</div>`;

                return `<table class="table table-sm table-hover table-bordered mb-0" style="font-size: 0.75rem;">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-3" style="width:30%">ATRIBUTO</th>
                            <th style="width:35%">ESTADO ANTERIOR</th>
                            <th style="width:35%">ESTADO NUEVO</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${keys.map(k => {
                    const valA = (oA[k] !== undefined && oA[k] !== null) ? oA[k] : '-';
                    const valN = (oN[k] !== undefined && oN[k] !== null) ? oN[k] : '-';
                    const isChanged = JSON.stringify(valA) !== JSON.stringify(valN);

                    return `<tr class="${isChanged ? 'table-warning animate__animated animate__pulse' : ''}">
                                <td class="fw-bold bg-light ps-3 text-uppercase text-muted">${k.replace(/_/g, ' ')}</td>
                                <td class="text-danger text-decoration-line-through">${typeof valA === 'object' ? JSON.stringify(valA) : valA}</td>
                                <td class="text-success fw-bold">${typeof valN === 'object' ? JSON.stringify(valN) : valN}</td>
                            </tr>`;
                }).join('')}
                    </tbody>
                </table>`;
            } catch (e) {
                console.error("Fallo crítico en Motor Diff:", e);
                return `<div class="alert alert-warning m-3 extra-small shadow-sm border-0">
                            <strong>FALLO DE PARSEO ESTRUCTURAL:</strong> Los datos no pudieron ser procesados como objeto.
                            <pre class="mt-2 p-2 bg-white border rounded">${nvo}</pre>
                        </div>`;
            }
        },

        poblarFiltros: function (data) {
            const sU = document.getElementById('filter-audit-user');
            const sA = document.getElementById('filter-audit-action');
            if (sU && sU.options.length <= 1) {
                [...new Set(data.map(l => l.USER_EMAIL))].sort().forEach(u => sU.add(new Option(u, u)));
            }
            if (sA && sA.options.length <= 1) {
                [...new Set(data.map(l => l.ACTION_TYPE))].sort().forEach(a => sA.add(new Option(a, a)));
            }
        },

        _renderBadgeEvento: function (v, r) {
            let bg = 'bg-secondary';
            if (v.includes('CREATE')) bg = 'bg-success';
            if (v.includes('UPDATE')) bg = 'bg-primary';
            if (v.includes('AUTH_SUCCESS')) bg = 'bg-info';
            if (v.includes('TIMEOUT') || v.includes('LOGOUT')) bg = 'bg-dark';
            if (v.includes('RUPTURA') || r.ID_LOG === this.estado.idRuptura) bg = 'bg-danger animate__animated animate__flash animate__infinite';

            return `<span class="badge ${bg} extra-small">${v}</span>`;
        }
    };
</script>
