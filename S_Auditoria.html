<script>
    /**
     * @file S_Auditoria.html
     * @version 5.2.1
     * @project ERP MDP PAN19 - Sistema de Gestión Industrial
     * @author Murphy - Arquitecto PMDC
     * @compliance ISO 22000 / SII Chile / URS-28
     * @description Integración de Motor Pre-Procesador de Sesiones Dinámico (Aislamiento de Conexiones).
     */

    window.Ctrl_Auditoria = {
        meta: {
            id: 'auditoria',
            version: '5.2.1',
            titulo: 'Auditoría Forense',
            icono: 'bi-shield-lock-fill',
            tematica: 'Administración',
            seguridad: { permisos: ['*'], nivel_acceso: 1 }
        },

        estado: {
            filtroUser: '',
            filtroAccion: '',
            filtroTiempo: '30', // '1', '7', '30', 'mes', 'todo'
            limiteFilas: 15,
            idRuptura: null,
            soloRupturas: false
        },

        init: function () {
            window.addEventListener('erp-datos-listos', () => {
                if (window.SISTEMA_ERP.moduloActual === this.meta.id) this.render();
            });
            if (window.SISTEMA_ERP?.datos?.['SYS_AUDIT_LOG']) this.render();
        },

        setFiltro: function (key, val) {
            if (key === 'soloRupturas') {
                this.estado[key] = val === true || val === 'true';
            } else {
                this.estado[key] = val;
            }
            this.render();
        },

        aplicarFiltros: function (data) {
            const ahora = new Date();
            const mesActual = ahora.getMonth();
            const anioActual = ahora.getFullYear();

            return data.filter(l => {
                if (this.estado.soloRupturas && this.estado.idRuptura) {
                    return (l.ID_LOG || l.ID) === this.estado.idRuptura;
                }

                const f = new Date(l.TIMESTAMP);
                const mUser = !this.estado.filtroUser || l.USER_EMAIL === this.estado.filtroUser;
                const mAcc = !this.estado.filtroAccion || l.ACTION_TYPE === this.estado.filtroAccion;

                let mTiempo = true;
                if (this.estado.filtroTiempo === '1') mTiempo = (ahora - f) <= 86400000;
                else if (this.estado.filtroTiempo === '7') mTiempo = (ahora - f) <= 7 * 86400000;
                else if (this.estado.filtroTiempo === '30') mTiempo = (ahora - f) <= 30 * 86400000;
                else if (this.estado.filtroTiempo === 'mes') mTiempo = (f.getMonth() === mesActual && f.getFullYear() === anioActual);

                return mUser && mAcc && mTiempo;
            });
        },

        // 🚀 FIX V5.2.1: MOTOR DE SESIONES DINÁMICO (Aislamiento Forense en Memoria)
        _preprocesarSesiones: function (data) {
            if (!data || data.length === 0) return;
            // Evitar doble procesamiento si ya se calculó en este ciclo de RAM
            if (data[0]._SESSION_ID) return;

            // Orden cronológico estricto (del más viejo al más nuevo) para trazar la historia real
            const sorted = [...data].sort((a, b) => new Date(a.TIMESTAMP) - new Date(b.TIMESTAMP));
            const sesionesActivas = {};

            sorted.forEach(log => {
                const user = log.USER_EMAIL || 'DESCONOCIDO';
                const action = String(log.ACTION_TYPE || '').toUpperCase();

                // 1. LÍMITE DE INICIO: Si es un login exitoso, creamos un nuevo bloque de sesión
                if (action.includes('AUTH_SUCCESS') || action.includes('AUTH_REGISTER')) {
                    const timeHash = new Date(log.TIMESTAMP).getTime().toString().slice(-5);
                    const randHash = Math.random().toString(36).substring(2, 5).toUpperCase();
                    sesionesActivas[user] = `S-${timeHash}-${randHash}`;
                }

                // 2. FALLBACK: Si hay un evento pero el usuario no tiene sesión activa (ej. acciones del sistema)
                if (!sesionesActivas[user]) {
                    sesionesActivas[user] = `SYS-${user.split('@')[0].toUpperCase().substring(0, 4)}`;
                }

                // 3. AMARRE: Etiquetamos el registro con el ID de sesión vigente
                log._SESSION_ID = sesionesActivas[user];

                // 4. LÍMITE DE CIERRE: Si el usuario sale o se le corta la sesión, destruimos el bloque
                if (action.includes('LOGOUT') || action.includes('TIMEOUT') || action.includes('REJECT')) {
                    delete sesionesActivas[user];
                }
            });
        },

        render: function () {
            const raw = window.SISTEMA_ERP.datos['SYS_AUDIT_LOG'] || [];

            // 🚀 Inyectamos los límites de sesión antes de filtrar
            this._preprocesarSesiones(raw);

            const logsFiltrados = this.aplicarFiltros(raw).reverse();

            // 1. GESTIÓN DE ALERTA GLOBAL
            const alertZone = document.getElementById('audit-integrity-alert');
            if (alertZone) {
                alertZone.innerHTML = this.estado.idRuptura
                    ? `<div class="alert alert-danger shadow pulse-danger-glow d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                        <strong>BRECHA DE INTEGRIDAD DETECTADA:</strong> El registro <code>${this.estado.idRuptura}</code> no coincide con su firma digital.
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-dark" onclick="window.Ctrl_Auditoria.setFiltro('soloRupturas', true)">Aislar Error</button>
                        <button class="btn btn-sm btn-outline-dark" onclick="window.Ctrl_Auditoria.setFiltro('idRuptura', null)">Ignorar</button>
                    </div>
                   </div>` : '';
            }

            this.poblarFiltros(raw);

            // 2. RENDERIZADO ATÓMICO (Colorimetría y Agrupación por Sesión Real)
            Factory.crearTabla('v-auditoria-contenedor-principal', {
                data: logsFiltrados,
                idKey: 'ID_LOG', // Fallback dinámico manejado en las celdas
                config: { rowsPerPage: parseInt(this.estado.limiteFilas), pagination: true, rowSelector: true, columnasCRUD: false },
                columns: [
                    {
                        label: 'Marca de Tiempo', key: 'TIMESTAMP',
                        render: (v, r) => {
                            const pk = r.ID_LOG || r.ID;
                            const esMalo = pk === this.estado.idRuptura;
                            return `<div class="${esMalo ? 'bg-danger bg-opacity-25 p-1 rounded' : ''}">
                                    <span class="small font-monospace fw-bold text-secondary">${new Date(v).toLocaleString('es-CL')}</span>
                                    ${esMalo ? '<br><span class="badge bg-danger pulse"><i class="bi bi-x-octagon"></i> CORRUPTO</span>' : ''}
                                </div>`;
                        }
                    },
                    {
                        label: 'Identidad', key: 'USER_EMAIL',
                        render: (v) => {
                            const inicial = (v || 'U').charAt(0).toUpperCase();
                            return `<div class="d-flex align-items-center">
                                        <div class="bg-secondary text-white fw-bold text-center rounded-circle me-2" style="width:28px;height:28px;line-height:28px;font-size:0.75rem;">${inicial}</div>
                                        <span class="text-dark fw-bold small">${v}</span>
                                    </div>`;
                        }
                    },
                    {
                        label: 'Operación', key: 'ACTION_TYPE',
                        render: (v) => {
                            let color = 'bg-secondary';
                            if (v.includes('CREATE') || v.includes('SUCCESS')) color = 'bg-success';
                            else if (v.includes('UPDATE')) color = 'bg-warning text-dark';
                            else if (v.includes('DELETE') || v.includes('REJECT') || v.includes('ERROR')) color = 'bg-danger';
                            else if (v.includes('AUTH')) color = 'bg-info text-dark';
                            return `<span class="badge ${color} border shadow-sm font-monospace extra-small px-2 py-1">${v}</span>`;
                        }
                    },
                    {
                        label: 'Módulo', key: 'MODULO',
                        render: (v) => `<span class="small fw-bold text-uppercase text-primary">${v}</span>`
                    },
                    {
                        label: 'Bloque de Sesión', key: 'ID_LOG',
                        render: (valOriginal, row) => {
                            // 🚀 FIX: Garantizamos la lectura correcta de la llave primaria
                            const id = row.ID_LOG || row.ID || 'N/A';

                            // Extraemos el ID de sesión generado por nuestro motor en memoria
                            const sid = row._SESSION_ID || 'DESC';
                            const esMutacion = row.VALOR_NUEVO && row.VALOR_NUEVO !== 'N/A';

                            return `
                        <div class="d-flex gap-2 align-items-center">
                            <button class="btn btn-sm btn-outline-primary py-0 px-2 font-monospace extra-small rounded-pill fw-bold" 
                                onclick="window.Ctrl_Auditoria.abrirRelato('${id}', '${sid}')" title="Ver Historia de Sesión">
                                <i class="bi bi-diagram-3 me-1"></i>${sid}
                            </button>
                            ${esMutacion ? `
                                <button class="btn btn-sm btn-success px-2 py-0 shadow-sm fw-bold extra-small rounded" onclick="window.Ctrl_Auditoria.abrirDiff('${id}')" title="Inspeccionar Mutación">
                                    DIFF
                                </button>` : ''}
                        </div>`;
                        }
                    }
                ]
            });
        },

        verificarIntegridad: function () {
            window.ERP_Utils?.mostrarLoading(true);
            google.script.run
                .withSuccessHandler(resStr => {
                    window.ERP_Utils?.mostrarLoading(false);
                    const res = JSON.parse(resStr);
                    if (res.integro) {
                        this.estado.idRuptura = null;
                        window.ERP_Utils.mostrarToast("Validación Exitosa: Cadena intacta.", "success");
                    } else {
                        this.estado.idRuptura = res.idRuptura;
                        window.ERP_Utils.mostrarToast("🚨 FALLO DE SEGURIDAD DETECTADO", "danger");
                    }
                    this.render();
                })
                .w_verificarIntegridadLogs();
        },

        /**
         * @function abrirRelato
         * Construye la historia cronológica respetando ESTRICTAMENTE el ID de Sesión.
         */
        abrirRelato: function (idRef, sid) {
            const raw = window.SISTEMA_ERP.datos['SYS_AUDIT_LOG'] || [];
            const base = raw.find(l => (l.ID_LOG || l.ID) === idRef);
            if (!base) return;

            // 🚀 AISLAMIENTO PERFECTO: Solo traemos eventos que compartan el ID de Sesión exacto.
            const eventos = raw.filter(l => l._SESSION_ID === sid)
                .sort((a, b) => new Date(a.TIMESTAMP) - new Date(b.TIMESTAMP));

            const bodyId = Factory.abrirModal({ titulo: `Línea de Tiempo - Conexión: ${sid}`, tamaño: 'modal-lg' });

            document.getElementById(bodyId).innerHTML = `
            <div class="p-4 bg-light">
                <div class="alert alert-dark border-0 py-2 small mb-4 shadow-sm d-flex align-items-center">
                    <div class="bg-secondary text-white fw-bold text-center rounded-circle me-3" style="width:35px;height:35px;line-height:35px;">${base.USER_EMAIL.charAt(0).toUpperCase()}</div>
                    <div>
                        <div class="fw-bold fs-6">${base.USER_EMAIL}</div>
                        <div class="text-muted extra-small">Registros agrupados bajo la sesión <b>${sid}</b>.</div>
                    </div>
                </div>

                <div class="timeline border-start border-3 ms-3 ps-4" style="border-color: #0d6efd !important;">
                    ${eventos.map(e => {
                const pk = e.ID_LOG || e.ID;
                const esCorrupto = pk === this.estado.idRuptura;
                const esActual = pk === idRef;
                let colorAcc = e.ACTION_TYPE.includes('CREATE') ? 'text-success' : (e.ACTION_TYPE.includes('DELETE') ? 'text-danger' : 'text-primary');

                return `
                        <div class="mb-4 position-relative ${esCorrupto ? 'p-2 bg-danger bg-opacity-10 rounded border border-danger' : ''}">
                            <i class="bi bi-record-circle-fill position-absolute ${esActual ? 'text-warning fs-5' : colorAcc}" 
                               style="left: -2.35rem; top: -0.2rem; background: #f8f9fa;"></i>
                            
                            <div class="d-flex justify-content-between align-items-start mb-1">
                                <span class="badge bg-dark text-white font-monospace shadow-sm">${new Date(e.TIMESTAMP).toLocaleTimeString('es-CL')}</span>
                                ${(e.VALOR_NUEVO && e.VALOR_NUEVO !== 'N/A') ? `<button class="btn btn-outline-success btn-sm fw-bold px-3 py-0 shadow-sm rounded-pill extra-small" onclick="window.Ctrl_Auditoria.abrirDiff('${pk}')"><i class="bi bi-file-diff me-1"></i> VER CAMBIOS</button>` : ''}
                            </div>
                            
                            <div class="card shadow-sm border-0 mt-2">
                                <div class="card-body py-2 px-3 d-flex align-items-center gap-2">
                                    <span class="badge bg-light text-dark border font-monospace extra-small">${e.ACTION_TYPE}</span>
                                    <span class="small fw-bold text-muted">en módulo <span class="text-primary">${e.MODULO}</span></span>
                                </div>
                            </div>
                        </div>`;
            }).join('')}
                </div>
            </div>`;
        },

        abrirDiff: function (id) {
            const log = window.SISTEMA_ERP.datos['SYS_AUDIT_LOG'].find(l => (l.ID_LOG || l.ID) === id);
            if (!log) return;
            const html = `
            <div class="p-4">
                <div class="alert alert-success border-0 py-2 small mb-3 shadow-sm">
                    <i class="bi bi-shield-check-fill me-2"></i> Inspección Técnica (Estructura de Cambios)
                </div>
                <div class="table-responsive rounded border shadow-sm">
                    <table class="table table-sm table-striped mb-0" style="font-size:0.75rem">
                        <thead class="table-dark text-center">
                            <tr><th>Atributo</th><th class="bg-danger bg-opacity-25">Antes</th><th class="bg-success bg-opacity-25">Después</th></tr>
                        </thead>
                        <tbody>${this.generarFilasDiff(log.VALOR_ANTERIOR, log.VALOR_NUEVO)}</tbody>
                    </table>
                </div>
                <div class="mt-3 p-2 bg-dark text-success rounded font-monospace extra-small text-break border border-success">
                    <b>DIGITAL SIGNATURE (SHA-256):</b> ${log.HASH_RECORD || 'NO DISPONIBLE'}
                </div>
            </div>`;
            window.ERP_Utils.abrirModalDinamico("DETALLE TÉCNICO DE MUTACIÓN", html, 'modal-lg');
        },

        generarFilasDiff: function (ant, nue) {
            let oA = {}, oN = {};
            try { oA = JSON.parse(ant || '{}'); oN = JSON.parse(nue || '{}'); } catch (e) { }
            const keys = [...new Set([...Object.keys(oA), ...Object.keys(oN)])];
            if (keys.length === 0) return `<tr><td colspan="3" class="text-center text-muted">Sin atributos parseables</td></tr>`;
            return keys.map(k => `<tr><td class="fw-bold text-uppercase extra-small bg-light">${k}</td><td class="text-danger extra-small">${oA[k] || '-'}</td><td class="text-success fw-bold extra-small">${oN[k] || '-'}</td></tr>`).join('');
        },

        poblarFiltros: function (data) {
            const sU = document.getElementById('filter-audit-user');
            const sA = document.getElementById('filter-audit-action');
            if (sU && sU.options.length <= 1) {
                [...new Set(data.map(l => l.USER_EMAIL))].sort().forEach(u => sU.add(new Option(u, u)));
            }
            if (sA && sA.options.length <= 1) {
                [...new Set(data.map(l => l.ACTION_TYPE))].sort().forEach(a => sA.add(new Option(a, a)));
            }
        }
    };
</script>
